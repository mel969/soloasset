VIEWS.dashboard = function(root) {
  const y = thisYear();
  const active = STATE.assets.filter(a => a.status === "active");
  const tot = Depreciation.yearTotals(active, y);

  const byCat = {};
  active.forEach(a => {
    const c = byId(STATE.categories, a.category_id);
    const key = c ? c.name : "Uncategorized";
    if (!byCat[key]) byCat[key] = { count:0, cost:0 };
    byCat[key].count++; byCat[key].cost += +a.cost||0;
  });
  const byEnt = {};
  active.forEach(a => {
    const e = byId(STATE.entities, a.entity_id);
    const key = e ? e.name : "Unassigned";
    if (!byEnt[key]) byEnt[key] = { count:0, cost:0 };
    byEnt[key].count++; byEnt[key].cost += +a.cost||0;
  });

  root.appendChild(el("h2",{}, "Dashboard ", el("small",{}, "Tax year " + y)));

  root.appendChild(el("div",{class:"kpi-row"},
    kpi("Active assets", active.length, ""),
    kpi("Total cost basis", fmt$(tot.cost), ""),
    kpi(y+" depreciation", fmt$(tot.depreciation), "§179 + bonus + regular"),
    kpi("Accumulated", fmt$(tot.accumulated), ""),
    kpi("Net book value", fmt$(tot.nbv), "End of "+y),
    kpi("Entities in use", Object.keys(byEnt).length, STATE.entities.length + " available"),
  ));

  const catLink = (name) => {
    const c = STATE.categories.find(x=>x.name===name);
    const a = el("a",{href:"#",style:"color:var(--maroon);text-decoration:none;font-weight:600;cursor:pointer"},name);
    a.onclick = (e) => { e.preventDefault(); show("assets",{category_id: c?c.id:"__none__", status:"active"}); };
    return a;
  };
  const entLink = (name) => {
    const en = STATE.entities.find(x=>x.name===name);
    const a = el("a",{href:"#",style:"color:var(--maroon);text-decoration:none;font-weight:600;cursor:pointer"},name);
    a.onclick = (e) => { e.preventDefault(); show("assets",{entity_id: en?en.id:"__none__", status:"active"}); };
    return a;
  };
  root.appendChild(card("By category",
    tableEl(
      ["Category","# Assets","Cost basis"],
      Object.entries(byCat).sort((a,b)=>b[1].cost-a[1].cost).map(([name,v])=>
        [catLink(name), v.count, {class:"num", value:fmt$(v.cost)}]
      )
    )
  ));
  root.appendChild(card("By entity",
    tableEl(
      ["Entity","# Assets","Cost basis"],
      Object.entries(byEnt).sort((a,b)=>b[1].cost-a[1].cost).map(([name,v])=>
        [entLink(name), v.count, {class:"num", value:fmt$(v.cost)}]
      )
    )
  ));
};

function kpi(lbl, v, sub) {
  return el("div",{class:"kpi"},
    el("div",{class:"lbl"},lbl),
    el("div",{class:"v"},v),
    el("div",{class:"sub"},sub||""));
}
function card(title, body) {
  return el("div",{class:"card"},
    title && el("div",{class:"hd"}, el("h3",{},title)),
    el("div",{class:"bd tight"}, body));
}
function tableEl(headers, rows, opts={}) {
  const thead = el("thead",{}, el("tr",{}, ...headers.map(h => typeof h==="object"? el("th",{class:h.class||""},h.label): el("th",{},h))));
  const tbody = el("tbody",{});
  if (!rows.length) tbody.appendChild(el("tr",{}, el("td",{colspan:headers.length,style:"padding:22px;color:#888;text-align:center"}, opts.empty||"No records")));
  rows.forEach(r => {
    const tr = el("tr",{});
    r.forEach(c => {
      if (c && typeof c==="object" && !c.nodeType) tr.appendChild(el("td",{class:c.class||""}, c.value));
      else if (c && c.nodeType) { const td = el("td",{}); td.appendChild(c); tr.appendChild(td); }
      else tr.appendChild(el("td",{}, c==null?"":String(c)));
    });
    tbody.appendChild(tr);
  });
  return el("table",{}, thead, tbody);
}

// ============================================================
// VIEW: Assets
// ============================================================
VIEWS.assets = function(root, ctx) {
  const state = { q:"", entity: (ctx&&ctx.entity_id)||"", category: (ctx&&ctx.category_id)||"", status: (ctx&&ctx.status)||"active" };
  root.appendChild(el("h2",{},"Assets ", el("small",{},STATE.assets.length+" total")));

  const bar = el("div",{class:"card"},
    el("div",{class:"bd"},
      el("div",{class:"filters"},
        field("Search", el("input",{type:"text",placeholder:"Description, serial, VIN, tag…",
          oninput:e=>{state.q=e.target.value.toLowerCase(); render();}})),
        field("Entity", entitySelect({allowAll:true, value: state.entity, onchange:v=>{state.entity=v; render();}})),
        field("Category", categorySelect({allowAll:true, value: state.category, onchange:v=>{state.category=v; render();}})),
        field("Status", (() => {
          const s = el("select",{onchange:e=>{state.status=e.target.value; render();}});
          [["active","Active"],["disposed","Disposed"],["transferred","Transferred out"],["","All"]]
            .forEach(([v,l])=>s.appendChild(el("option",{value:v},l)));
          s.value = state.status; return s;
        })()),
        (function(){
          const lbl = [];
          if (state.entity) { const e=byId(STATE.entities,state.entity); if(e) lbl.push("Entity: "+e.name); }
          if (state.category) { const c=byId(STATE.categories,state.category); if(c) lbl.push("Category: "+c.name); }
          if (!lbl.length) return el("span",{});
          return el("div",{style:"font-size:12px;color:var(--muted);grid-column:1/-1;margin-top:4px"},
            "Filtered: "+lbl.join(" · ")+"  ",
            el("a",{href:"#",style:"color:var(--maroon)",onclick:ev=>{ev.preventDefault(); state.entity=""; state.category=""; render();}},"clear"));
        })(),
        el("div",{},
          el("button",{class:"btn",onclick:()=>openAssetModal(null)}, "+ Add asset"),
          el("button",{class:"btn secondary",style:"margin-left:6px",onclick:openImportModal}, "Import CSV")
        )
      )
    )
  );
  root.appendChild(bar);

  const tblCard = el("div",{class:"card"});
  const tblBd = el("div",{class:"bd tight"});
  tblCard.appendChild(tblBd);
  root.appendChild(tblCard);

  function filtered() {
    return STATE.assets.filter(a => {
      if (state.status && a.status !== state.status) return false;
      if (state.entity && a.entity_id !== state.entity) return false;
      if (state.category && a.category_id !== state.category) return false;
      if (state.q) {
        const hay = [a.description, a.asset_number, a.serial_number, a.vin, a.make, a.model, a.location, a.notes]
          .filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(state.q)) return false;
      }
      return true;
    });
  }

  function render() {
    const list = filtered();
    tblBd.innerHTML = "";
    const y = thisYear();

    // Partition: property sub-assets get grouped under parent folder rows.
    const propGroups = {}; // pname -> [assets]
    const regular = [];
    list.forEach(a => {
      if (a.pool_type === "property" && a.property_group) {
        (propGroups[a.property_group] = propGroups[a.property_group] || []).push(a);
      } else {
        regular.push(a);
      }
    });

    const tbl = el("table",{class:"tbl",style:"width:100%;table-layout:auto"});
    const thead = el("thead",{}, el("tr",{},
      [
        {label:"",style:"width:28px"},
        {label:"Description"},
        {label:"Category",style:"width:160px"},
        {label:"Entity",style:"width:160px"},
        {label:"In service",style:"width:100px"},
        {label:"Cost",style:"text-align:right;width:110px"},
        {label:"Dep "+y,style:"text-align:right;width:100px"},
        {label:"NBV "+y+" end",style:"text-align:right;width:110px"},
        {label:"Status",style:"width:80px"},
        {label:"Actions",style:"width:1%;white-space:nowrap;text-align:right"}
      ].map(h => el("th",{style:h.style||""}, h.label))
    ));
    tbl.appendChild(thead);
    const tbody = el("tbody",{});
    tbl.appendChild(tbody);

    function subAssetRow(a, opts) {
      opts = opts||{};
      const indent = !!opts.indent;
      const propName = opts.propertyName || "";
      const c = byId(STATE.categories, a.category_id);
      const e = byId(STATE.entities, a.entity_id);
      const s = Depreciation.schedule(a, y).find(r=>r.year===y);
      const dep = s ? s.total_expense : 0;
      const nbv = s ? s.closing_nbv : (new Date(a.in_service_date).getFullYear()>y ? (+a.cost||0) : 0);
      // For indented sub-rows inside a property folder, strip the "PropertyName - " prefix.
      let displayDesc = a.description || "";
      if (indent && propName && displayDesc.toLowerCase().startsWith(propName.toLowerCase() + " - ")) {
        displayDesc = displayDesc.slice(propName.length + 3);
      }
      const titleLink = el("a",{href:"#",style:"color:var(--maroon);text-decoration:none;cursor:pointer;font-weight:500"}, displayDesc);
      titleLink.onclick = ev => { ev.preventDefault(); show("asset",{id:a.id}); };
      const tr = el("tr",{});
      tr.appendChild(el("td",{},"")); // caret column
      // Description cell: for indented rows, thin maroon left border + subtle indent. No gold.
      const descCell = el("td",{style: indent ? "padding-left:36px;position:relative" : ""}, titleLink);
      if (indent) {
        // Subtle left guide line
        descCell.appendChild(el("span",{style:"position:absolute;left:12px;top:0;bottom:0;width:1px;background:var(--border)"}));
      }
      if (!indent) {
        const meta = [a.asset_number, a.make, a.model, a.year].filter(Boolean).join(" · ");
        if (meta) descCell.appendChild(el("div",{class:"small"}, meta));
      }
      tr.appendChild(descCell);
      tr.appendChild(el("td",{}, c ? el("span",{class:"chip",style:c.color?("background:"+c.color+"18; color:"+c.color+";border:1px solid "+c.color+"33"):""}, c.name) : el("span",{class:"chip dim"},"—")));
      tr.appendChild(el("td",{style:"white-space:nowrap"}, e?e.name:"—"));
      tr.appendChild(el("td",{style:"white-space:nowrap"}, fmtDate(a.in_service_date)));
      tr.appendChild(el("td",{class:"num",style:"text-align:right"}, fmt$(a.cost)));
      tr.appendChild(el("td",{class:"num",style:"text-align:right"}, fmt$(dep)));
      tr.appendChild(el("td",{class:"num",style:"text-align:right"}, fmt$(nbv)));
      tr.appendChild(el("td",{}, el("span",{class:"chip "+(a.status==="active"?"ok":a.status==="disposed"?"err":"warn")}, a.status)));
      tr.appendChild(el("td",{style:"white-space:nowrap;text-align:right"}, el("div",{style:"display:flex;gap:4px;justify-content:flex-end;flex-wrap:nowrap"},
        el("button",{class:"btn ghost sm",onclick:()=>openAssetModal(a.id)},"Edit"),
        el("button",{class:"btn ghost sm",onclick:()=>openScheduleModal(a.id)},"Schedule"),
        a.status==="active" && el("button",{class:"btn ghost sm",onclick:()=>openTransferModal(a.id)},"Transfer"),
        a.status==="active" && el("button",{class:"btn ghost sm",onclick:()=>openDisposalModal(a.id)},"Dispose"),
      )));
      return tr;
    }

    // Regular assets first
    if (regular.length === 0 && Object.keys(propGroups).length === 0) {
      tbody.appendChild(el("tr",{}, el("td",{colspan:"10",style:"color:var(--muted);padding:8px;text-align:center"},"No assets match. Click + Add asset.")));
    }
    regular.forEach(a => tbody.appendChild(subAssetRow(a, {indent:false})));

    // Property folders
    Object.keys(propGroups).sort().forEach(pname => {
      const items = propGroups[pname];
      const totalCost = items.reduce((s,a)=>s+(+a.cost||0)+(+a.improvements_cost||0),0);
      const yTot = Depreciation.yearTotals(items.filter(a=>!a.is_land && a.status==="active"), y);
      const nbv = totalCost - yTot.accumulated;
      const anyStatus = items.some(a=>a.status==="active") ? "active" : items[0].status;
      const anyEntity = byId(STATE.entities, items[0].entity_id);

      let expanded = false;
      const caret = el("span",{style:"display:inline-block;width:12px;color:var(--maroon);font-size:9px;transform:translateY(-1px)"},"▸");
      // Parent row: clean cream background, subtle maroon left accent, no emoji, no gradient
      const parentRow = el("tr",{style:"cursor:pointer;background:#f5efe3"});
      parentRow.appendChild(el("td",{style:"text-align:center;border-left:3px solid var(--maroon)"}, caret));
      parentRow.appendChild(el("td",{style:"padding:10px 6px"},
        el("div",{style:"font-weight:600;font-size:14px;color:#2e2520"}, pname),
        el("div",{class:"small",style:"font-weight:400;color:var(--muted);margin-top:2px"}, items.length+" sub-assets")
      ));
      parentRow.appendChild(el("td",{}, el("span",{class:"chip",style:"background:rgba(139,26,26,0.1);color:var(--maroon);border:1px solid rgba(139,26,26,0.2);font-weight:500"},"Property")));
      parentRow.appendChild(el("td",{style:"white-space:nowrap"}, anyEntity?anyEntity.name:"—"));
      parentRow.appendChild(el("td",{},""));
      parentRow.appendChild(el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(totalCost)));
      parentRow.appendChild(el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(yTot.depreciation)));
      parentRow.appendChild(el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(nbv)));
      parentRow.appendChild(el("td",{}, el("span",{class:"chip "+(anyStatus==="active"?"ok":"warn")}, anyStatus)));
      parentRow.appendChild(el("td",{style:"white-space:nowrap;text-align:right"}, el("div",{style:"display:flex;gap:4px;justify-content:flex-end"},
        el("button",{class:"btn ghost sm",onclick:(e)=>{e.stopPropagation(); openPropertyModal(pname);}},"Edit property")
      )));

      const subRows = items
        .sort((a,b)=> (a.is_land?0:1)-(b.is_land?0:1) || (a.description||"").localeCompare(b.description||""))
        .map(a => { const r = subAssetRow(a, {indent:true, propertyName:pname}); r.style.display = "none"; return r; });
      parentRow.addEventListener("click", () => {
        expanded = !expanded;
        caret.textContent = expanded ? "▾" : "▸";
        subRows.forEach(r => r.style.display = expanded ? "" : "none");
      });
      tbody.appendChild(parentRow);
      subRows.forEach(r => tbody.appendChild(r));
    });

    tblBd.appendChild(tbl);
  }
  render();
};

function field(label, input) { return el("div",{}, el("label",{},label), input); }

function entitySelect({allowAll=false, value=null, onchange=null}={}) {
  const s = el("select",{});
  if (allowAll) s.appendChild(el("option",{value:""},"All entities"));
  else s.appendChild(el("option",{value:""},"— select —"));
  const groups = {};
  STATE.entities.forEach(e => { (groups[e.parent_group||"Other"] = groups[e.parent_group||"Other"] || []).push(e); });
  Object.keys(groups).sort().forEach(g => {
    const og = el("optgroup",{label:g});
    groups[g].forEach(e => og.appendChild(el("option",{value:e.id}, e.name)));
    s.appendChild(og);
  });
  if (value) s.value = value;
  if (onchange) s.addEventListener("change", () => onchange(s.value));
  return s;
}
function categorySelect({allowAll=false, value=null, onchange=null}={}) {
  const s = el("select",{});
  s.appendChild(el("option",{value:""}, allowAll?"All categories":"— select —"));
  STATE.categories.forEach(c => s.appendChild(el("option",{value:c.id}, c.name)));
  if (value) s.value = value;
  if (onchange) s.addEventListener("change", () => onchange(s.value));
  return s;
}

// ---------- Asset create/edit modal ----------
function openAssetModal(id, defaults) {
  const a = id ? Object.assign({}, byId(STATE.assets, id)) : Object.assign({
    description:"", cost:0, salvage_value:0, in_service_date: todayISO(),
    method:"ddb", life_years:5, convention:"half_year", bonus_pct:0, section_179:0,
    status:"active"
  }, defaults || {});
  const f = {};
  function refreshPreview() {
    const prev = f.preview;
    prev.innerHTML = "";
    if (!(+a.cost>0) || !a.in_service_date || !a.method || !a.life_years || !a.convention) {
      prev.appendChild(el("div",{class:"small"},"Enter cost, in-service date, method, life, convention to see schedule."));
      return;
    }
    const rows = Depreciation.schedule(a);
    const total = rows.reduce((s,r)=>s+r.total_expense,0);
    prev.appendChild(el("div",{class:"small",style:"margin-bottom:6px"},
      "Total scheduled expense: "+fmt$(total)+"  —  ends "+(rows.length?rows[rows.length-1].year:"—")));
    prev.appendChild(tableEl(
      ["Year","Open NBV","§179","Bonus","Depreciation","Accumulated","Close NBV","Notes"],
      rows.map(r => [r.year,{class:"num",value:fmt$(r.opening_nbv)},{class:"num",value:fmt$(r.sec179)},
        {class:"num",value:fmt$(r.bonus)},{class:"num",value:fmt$(r.depreciation)},
        {class:"num",value:fmt$(r.accumulated)},{class:"num",value:fmt$(r.closing_nbv)},{class:"small",value:r.notes}])
    ));
  }
  const categoryChange = () => {
    const c = byId(STATE.categories, a.category_id);
    if (c) {
      // Auto-flag land category as non-depreciating
      if (c.name === "Land") { a.is_land = true; if (f.landChk) f.landChk.checked = true; }
      if (!id) { // only auto-fill on new
        if (c.default_method)     { a.method=c.default_method; f.method.value=a.method; }
        if (c.default_life_years) { a.life_years=c.default_life_years; f.life.value=a.life_years; }
        if (c.default_convention) { a.convention=c.default_convention; f.conv.value=a.convention; }
        // Sensible defaults per property category (all straight-line, half-year)
        const presets = {
          "Residential Buildings":            { method:"sl", life_years:27.5, convention:"mid_month" },
          "Commercial Buildings":             { method:"sl", life_years:39,   convention:"mid_month" },
          "Agricultural Buildings":           { method:"sl", life_years:20,   convention:"half_year" },
          "Capitalized Building Improvements":{ method:"sl", life_years:27.5, convention:"mid_month" },
          "Land Improvements":                { method:"sl", life_years:15,   convention:"half_year" },
          "Fencing":                          { method:"ddb", life_years:7,   convention:"half_year" },
          "Farm Equipment":                   { method:"ddb", life_years:7,   convention:"half_year" },
          "Furniture & Fixtures":             { method:"ddb", life_years:7,   convention:"half_year" },
        };
        const p = presets[c.name];
        if (p) {
          a.method = p.method; a.life_years = p.life_years; a.convention = p.convention;
          if (f.method) f.method.value = p.method;
          if (f.life)   f.life.value   = p.life_years;
          if (f.conv)   f.conv.value   = p.convention;
        }
      }
    }
    refreshPreview();
  };
  const bindInput = (k, inp, num=false) => { inp.addEventListener("input", ()=>{ a[k] = num ? (+inp.value||0) : inp.value; refreshPreview(); }); return inp; };

  // -------- Asset type — drives visibility --------
  function inferType() {
    if (a.pool_type === "recip_mare") return "recip_mare";
    if (a.pool_type === "trading")    return "horse";
    if (a.pool_type === "property")   return "building";
    if (a.is_land)                    return "land";
    const c = byId(STATE.categories, a.category_id);
    if (c) {
      if (/^Land$/i.test(c.name)) return "land";
      if (/(Buildings|Improvements|Fencing|Land Improvements)/i.test(c.name)) return "building";
      if (/(Recipient Mares)/i.test(c.name)) return "recip_mare";
      if (/(Trading Horses|Horses)/i.test(c.name)) return "horse";
    }
    return "equipment";
  }
  let assetType = inferType();

  const typeSel = el("select",{onchange:e=>{ assetType=e.target.value; applyType(); }},
    el("option",{value:"equipment"},"Equipment / Machinery / Vehicle"),
    el("option",{value:"building"}, "Building / Real Estate (improvement, fencing, land imp.)"),
    el("option",{value:"recip_mare"},"Horse — Recip Mare"),
    el("option",{value:"horse"},    "Horse — Stallion / Trading / Other"),
    el("option",{value:"land"},     "Land (not depreciated)"),
    el("option",{value:"other"},    "Other")
  );
  typeSel.value = assetType;

  // -------- Common fields (always shown) --------
  const blkCommon = el("div",{class:"grid"},
    el("div",{class:"grid cols-2"},
      field("Asset type *", typeSel),
      field("Description *", bindInput("description", el("input",{type:"text",value:a.description||""})))
    ),
    el("div",{class:"grid cols-3"},
      field("Category", f.cat = categorySelect({value:a.category_id, onchange:v=>{a.category_id=v||null; categoryChange();}})),
      field("Entity *", f.ent = entitySelect({value:a.entity_id, onchange:v=>{a.entity_id=v||null;}})),
      field("In-service date *", bindInput("in_service_date", el("input",{type:"date",value:a.in_service_date||todayISO()})))
    )
  );

  // -------- Cost block (always shown; internal fields adapt to type) --------
  const assetNumberField = field("Asset # / tag", bindInput("asset_number", el("input",{type:"text",value:a.asset_number||""})));
  const blkCost = el("div",{class:"grid cols-3"},
    field("Cost *", moneyInput({value:a.cost, onChange:v=>{a.cost=v; refreshPreview();}})),
    assetNumberField,
    field("Salvage value", moneyInput({value:a.salvage_value, onChange:v=>{a.salvage_value=v; refreshPreview();}}))
  );

  // -------- Property block (improvements + prior accum) — building only --------
  const blkProperty = el("div",{class:"grid cols-3"},
    field("Improvements (capitalized)", moneyInput({value:a.improvements_cost, onChange:v=>{a.improvements_cost=v; refreshPreview();}})),
    field("Prior accum. dep. (pre-tracker)", moneyInput({value:a.prior_accum_dep, onChange:v=>{a.prior_accum_dep=v; refreshPreview();}})),
    field("§179", moneyInput({value:a.section_179, onChange:v=>{a.section_179=v; refreshPreview();}}))
  );

  // -------- Machinery details (VIN, Make, Model, Year, Serial, Invoice, Vendor, Location) --------
  const blkMachinery = el("div",{},
    el("div",{style:"font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:600"},"Equipment details"),
    el("div",{class:"grid cols-3"},
      field("Make", bindInput("make", el("input",{type:"text",value:a.make||""}))),
      field("Model", bindInput("model", el("input",{type:"text",value:a.model||""}))),
      field("Year", bindInput("year", el("input",{type:"number",min:"1900",max:"2100",value:a.year||""}), true))
    ),
    el("div",{class:"grid cols-3"},
      field("VIN", bindInput("vin", el("input",{type:"text",value:a.vin||""}))),
      field("Serial #", bindInput("serial_number", el("input",{type:"text",value:a.serial_number||""}))),
      field("Invoice #", bindInput("invoice_number", el("input",{type:"text",value:a.invoice_number||""})))
    ),
    el("div",{class:"grid cols-3"},
      field("Vendor", bindInput("vendor", el("input",{type:"text",value:a.vendor||""}))),
      field("Location", bindInput("location", el("input",{type:"text",value:a.location||""}))),
      field("§179", moneyInput({value:a.section_179, onChange:v=>{a.section_179=v; refreshPreview();}}))
    )
  );

  // -------- Recip Mare block (bucket + mare#) --------
  const bucketSel = el("select",{onchange:e=>{ a.bucket_tag=e.target.value; }},
    ...["Solo Horses","Graves Purchase","Repro","Solo - Post Cutover"].map(b=>el("option",{value:b},b))
  );
  bucketSel.value = a.bucket_tag || "Solo - Post Cutover";
  const blkRecip = el("div",{class:"grid cols-2"},
    field("Bucket *", bucketSel),
    field("Mare # (same as Asset #)", el("input",{type:"text",value:a.asset_number||"",oninput:e=>{a.asset_number=e.target.value;}}))
  );

  // -------- Horse/Trading block (ownership, co-owners, inventory) --------
  const blkHorseTrading = el("div",{class:"grid cols-3"},
    field("Solo ownership %", el("input",{type:"number",step:"0.0001",min:"0",max:"100",value:a.ownership_pct==null?100:a.ownership_pct,oninput:e=>a.ownership_pct=+e.target.value||0})),
    field("Inventory (not depreciated)", (()=>{ const c=el("input",{type:"checkbox"}); c.checked=!!a.is_inventory; c.onchange=()=>{ a.is_inventory=c.checked; refreshPreview(); }; return c; })()),
    field("Co-owners (name:% comma-sep)", el("input",{type:"text",placeholder:"John Smith:25, ABC LLC:10",value:(a.co_owners||[]).map(o=>o.name+":"+o.pct).join(", "),oninput:e=>{
      a.co_owners = e.target.value.split(",").map(s=>s.trim()).filter(Boolean).map(pair=>{
        const [name,pct] = pair.split(":").map(x=>x.trim());
        return { name: name||"", pct: +pct||0 };
      });
    }}))
  );

  // -------- Horse pedigree (year, color, sex, sire, dam) --------
  const blkPedigree = el("div",{},
    el("div",{style:"font-size:12px;color:var(--muted);margin:8px 0 4px;font-weight:600"},"Horse pedigree"),
    el("div",{class:"grid cols-3"},
      field("Foaling year", el("input",{type:"number",min:"1900",max:"2100",value:a.foaling_year||"",oninput:e=>a.foaling_year=+e.target.value||null})),
      field("Color (bay, chestnut, gray, ...)", el("input",{type:"text",value:a.color||"",oninput:e=>a.color=e.target.value})),
      field("Sex (f/c/g/m/s/ri)", el("input",{type:"text",maxlength:"2",value:a.sex||"",oninput:e=>a.sex=e.target.value}))
    ),
    el("div",{class:"grid cols-2"},
      field("Sire", el("input",{type:"text",value:a.sire||"",oninput:e=>a.sire=e.target.value})),
      field("Dam",  el("input",{type:"text",value:a.dam||"",oninput:e=>a.dam=e.target.value}))
    )
  );
  // -------- Depreciation block (always shown unless is_land) --------
  // Property-type select is hidden if the migration hasn't been run yet — the
  // Form 4797 report still works using the heuristic in effectivePropertyType().
  const propTypeHint = el("div",{class:"small",style:"margin-top:4px;color:var(--muted)"}, effectivePropertyTypeLabel(a));
  const propTypeField = STATE.taxColsReady ? field("Tax property type (Form 4797)", (()=>{
    const wrap = el("div",{});
    const s = el("select",{onchange: e => { a.property_type = e.target.value || null; propTypeHint.textContent = effectivePropertyTypeLabel(a); }});
    s.appendChild(el("option",{value:""}, "Use category / auto"));
    Object.entries(PROP_TYPE_LABELS).forEach(([v,l]) => s.appendChild(el("option",{value:v},l)));
    s.value = a.property_type || "";
    wrap.appendChild(s);
    wrap.appendChild(propTypeHint);
    return wrap;
  })()) : null;

  const blkDep = el("div",{},
    el("div",{class:"grid cols-3"},
      field("Method *", f.method = (() => {
        const s = el("select",{});
        [["bonus","Bonus + DDB remainder"],["ddb","200% Declining Balance (DDB)"],["db150","150% Declining Balance"],["sl","Straight Line"]]
          .forEach(([v,l])=>s.appendChild(el("option",{value:v},l)));
        s.value = a.method||"ddb"; s.onchange = () => { a.method=s.value; refreshPreview(); }; return s;
      })()),
      field("Life (years) *", f.life = bindInput("life_years", el("input",{type:"number",step:"0.5",min:"0.5",value:a.life_years||5}), true)),
      field("Convention *", f.conv = (() => {
        const s = el("select",{});
        [["half_year","Half-Year"],["mid_quarter","Mid-Quarter"],["mid_month","Mid-Month (real property)"]]
          .forEach(([v,l])=>s.appendChild(el("option",{value:v},l)));
        s.value = a.convention||"half_year"; s.onchange = () => { a.convention=s.value; refreshPreview(); }; return s;
      })())
    ),
    el("div",{class:"grid cols-2"},
      field("Bonus % (0–100)", bindInput("bonus_pct", el("input",{type:"number",step:"1",min:"0",max:"100",value:a.bonus_pct||0}), true)),
      propTypeField
    )
  );

  // -------- Live depreciable-basis summary --------
  const basisBox = el("div",{class:"small",style:"background:#faf8f5;border:1px solid var(--border);border-radius:4px;padding:6px 10px;margin:-4px 0 4px"});
  function renderBasisBox() {
    const rawCost = +a.cost||0, imp = +a.improvements_cost||0;
    const prior = +a.prior_accum_dep||0, sal = +a.salvage_value||0, s179 = +a.section_179||0;
    const totalValue = rawCost + imp;
    const depBasis = Math.max(totalValue - s179 - sal - prior, 0);
    basisBox.innerHTML = "";
    basisBox.appendChild(el("span",{},"Total value: "+fmt$(totalValue)));
    if (imp)   basisBox.appendChild(el("span",{style:"margin-left:12px;color:var(--muted)"},"(incl. improvements)"));
    if (prior) basisBox.appendChild(el("span",{style:"margin-left:12px;color:var(--muted)"},"− Prior accum "+fmt$(prior)));
    if (s179)  basisBox.appendChild(el("span",{style:"margin-left:12px;color:var(--muted)"},"− §179 "+fmt$(s179)));
    if (sal)   basisBox.appendChild(el("span",{style:"margin-left:12px;color:var(--muted)"},"− Salvage "+fmt$(sal)));
    basisBox.appendChild(el("span",{style:"margin-left:12px;font-weight:600"},"→ Depreciable basis (pre-bonus): "+fmt$(depBasis)));
  }
  // Wrap refreshPreview so the basis box updates too
  const _origRefresh = refreshPreview;
  refreshPreview = function() { renderBasisBox(); _origRefresh(); };
  renderBasisBox();

  // -------- Notes (collapsed) --------
  const blkNotes = el("details",{},
    el("summary",{style:"cursor:pointer;font-size:12px;color:var(--muted);margin-bottom:8px"},"Notes"),
    field("Notes", bindInput("notes", el("textarea",{}, a.notes||"")))
  );

  // -------- Photos section --------
  const blkPhotos = (() => {
    const wrap = el("details",{open: !!(a.photos && a.photos.length)},
      el("summary",{style:"cursor:pointer;font-size:12px;color:var(--muted);margin-bottom:8px"},"Photos (up to 5)"));
    const thumbs = el("div",{style:"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px"});
    const renderThumbs = () => {
      thumbs.innerHTML = "";
      (a.photos||[]).forEach((ph, idx) => {
        const box = el("div",{style:"position:relative;width:96px;height:96px;border:1px solid var(--border);border-radius:6px;overflow:hidden"});
        const img = el("img",{src: ph.url || ph, style:"width:100%;height:100%;object-fit:cover"});
        const del = el("button",{class:"btn danger sm",style:"position:absolute;top:2px;right:2px;padding:2px 6px;font-size:10px",
          onclick: async () => {
            try { if (ph.path) await sb.storage.from("asset-photos").remove([ph.path]); } catch(e){}
            a.photos = (a.photos||[]).filter((_,i)=>i!==idx);
            renderThumbs();
          }}, "×");
        box.appendChild(img); box.appendChild(del);
        thumbs.appendChild(box);
      });
    };
    renderThumbs();
    const fileInput = el("input",{type:"file",accept:"image/*",multiple:true,onchange:async(e)=>{
      const files = Array.from(e.target.files||[]);
      if (!files.length) return;
      const existing = (a.photos||[]).length;
      const room = Math.max(0, 5 - existing);
      if (!room) { flash("Max 5 photos. Delete one first.","err"); fileInput.value=""; return; }
      const toUpload = files.slice(0, room);
      for (const file of toUpload) {
        const ext = (file.name.split(".").pop()||"jpg").toLowerCase();
        const path = "assets/" + (id||"new-"+Date.now()) + "/" + Date.now()+"-"+Math.random().toString(36).slice(2,8)+"."+ext;
        const up = await sb.storage.from("asset-photos").upload(path, file, { contentType: file.type, upsert: false });
        if (up.error) { flash("Upload failed: "+up.error.message,"err"); continue; }
        const { data: pub } = sb.storage.from("asset-photos").getPublicUrl(path);
        a.photos = (a.photos||[]).concat([{ path, url: pub.publicUrl }]);
        renderThumbs();
      }
      fileInput.value = "";
      if (files.length > room) flash("Only "+room+" uploaded (5-photo limit).","warn");
    }});
    wrap.appendChild(thumbs);
    wrap.appendChild(el("div",{class:"small",style:"color:var(--muted);margin-bottom:6px"},"JPEG/PNG. Max 5 per asset."));
    wrap.appendChild(fileInput);
    return wrap;
  })();

  // -------- Preview --------
  f.preview = el("div",{style:"max-height:280px;overflow:auto;border:1px solid var(--border);border-radius:6px;padding:4px"});
  const blkPreview = el("div",{},
    el("h3",{style:"margin:18px 0 6px;font-size:14px"},"Depreciation preview"),
    f.preview
  );

  // -------- Assemble body --------
  const body = el("div",{class:"grid"},
    blkCommon, blkCost, blkMachinery, blkProperty, blkRecip, blkHorseTrading, blkPedigree,
    basisBox, blkDep, blkNotes, blkPhotos, blkPreview
  );

  // -------- applyType: show/hide blocks based on assetType --------
  function applyType() {
    const t = assetType;
    blkMachinery.style.display     = t === "equipment" ? "" : "none";
    blkProperty.style.display      = t === "building"  ? "" : "none";
    blkRecip.style.display         = t === "recip_mare" ? "" : "none";
    blkHorseTrading.style.display  = t === "horse"     ? "" : "none";
    blkPedigree.style.display      = (t === "horse" || t === "recip_mare") ? "" : "none";
    blkDep.style.display           = t === "land"      ? "none" : "";
    basisBox.style.display         = t === "land"      ? "none" : "";
    blkPreview.style.display       = t === "land"      ? "none" : "";

    // Sync data flags
    a.is_land = (t === "land");
    a.pool_type = (t === "recip_mare") ? "recip_mare"
                : (t === "horse")      ? "trading"
                : (a.pool_type === "property") ? "property"
                : null;

    // Apply smart defaults on type switch (new records only)
    if (!id) {
      if (t === "equipment") {
        if (!a.method || a.method === "sl") a.method = "ddb";
        if (!a.life_years) a.life_years = 5;
        if (!a.convention) a.convention = "half_year";
      } else if (t === "building") {
        a.method = a.method || "sl";
        a.life_years = a.life_years || 27.5;
        a.convention = a.convention || "mid_month";
      } else if (t === "recip_mare" || t === "horse") {
        a.method = a.method || "bonus";
        a.life_years = a.life_years || 7;
        a.convention = a.convention || "half_year";
        if (!a.bonus_pct) {
          const acq = a.in_service_date ? new Date(a.in_service_date) : new Date();
          a.bonus_pct = (acq >= new Date("2025-01-20")) ? 100 : 0;
        }
        if (t === "recip_mare" && !a.bucket_tag) { a.bucket_tag = "Solo - Post Cutover"; bucketSel.value = a.bucket_tag; }
        if (t === "recip_mare" && !a.category_id) {
          const cat = STATE.categories.find(c=>c.name==="Recipient Mares");
          if (cat) { a.category_id = cat.id; if (f.cat) f.cat.value = cat.id; }
        }
        if (t === "horse" && !a.category_id) {
          const cat = STATE.categories.find(c=>c.name==="Trading Horses");
          if (cat) { a.category_id = cat.id; if (f.cat) f.cat.value = cat.id; }
        }
      } else if (t === "land") {
        const cat = STATE.categories.find(c=>c.name==="Land");
        if (cat && !a.category_id) { a.category_id = cat.id; if (f.cat) f.cat.value = cat.id; }
      }
      if (f.method) f.method.value = a.method || "ddb";
      if (f.life)   f.life.value   = a.life_years || 5;
      if (f.conv)   f.conv.value   = a.convention || "half_year";
    }
    refreshPreview();
  }
  // Initial apply
  setTimeout(applyType, 0);
  refreshPreview();

  const footer = el("div",{class:"ft"},
    id && el("button",{class:"btn danger",style:"margin-right:auto", onclick:()=>{
      confirmModal("Delete asset permanently? This also removes transfer and disposal history.",
        async()=>{ await remove("assets", id); await refreshAll(); $("#modalHost").innerHTML=""; $("#modalHost").innerHTML=""; show("assets"); flash("Asset deleted"); });
    }}, "Delete"),
    el("button",{class:"btn secondary",onclick:()=>$("#modalHost").innerHTML=""},"Cancel"),
    el("button",{class:"btn",onclick:async()=>{
      if (!a.description || !(+a.cost>0) || !a.entity_id || !a.in_service_date) {
        flash("Description, entity, cost, in-service date are required","err"); return;
      }
      const payload = Object.assign({}, a); delete payload.categories; delete payload.entities;
      // Normalize empty property_type → null. If the migration hasn't been
      // run yet, drop the column so Postgres doesn't reject the row.
      if (payload.property_type === "" || payload.property_type == null) payload.property_type = null;
      if (!STATE.taxColsReady) delete payload.property_type;
      if (!id) { payload.created_by = USER.email; }
      let saved;
      try { saved = await upsert("assets", payload); }
      catch(e){ flash(e.message,"err"); return; }
      await logActivity("asset", saved.id, id?"update":"create",
        (id?"Updated ":"Created ")+saved.description+" — cost "+fmt$(saved.cost));
      await refreshAll(); $("#modalHost").innerHTML=""; show("assets"); flash(id?"Asset updated":"Asset added");
    }}, id?"Save changes":"Add asset")
  );

  modal({ title: id?"Edit asset":"Add asset", body, footer, wide:true });
}

// ---------- Schedule viewer ----------
function openScheduleModal(id) {
  const a = byId(STATE.assets, id); if (!a) return;
  const rows = Depreciation.schedule(a);
  const body = el("div",{},
    el("div",{class:"small",style:"margin-bottom:8px"},
      "Cost "+fmt$(a.cost)+" · "+METHOD_LABELS[a.method]+" · "+a.life_years+" yrs · "+CONV_LABELS[a.convention]+
      (a.bonus_pct?" · "+a.bonus_pct+"% bonus":"")+(a.section_179>0?" · §179 "+fmt$(a.section_179):"")
    ),
    tableEl(
      ["Year","Open NBV","§179","Bonus","Depreciation","Total expense","Accumulated","Close NBV","Notes"],
      rows.map(r => [r.year,{class:"num",value:fmt$(r.opening_nbv)},{class:"num",value:fmt$(r.sec179)},
        {class:"num",value:fmt$(r.bonus)},{class:"num",value:fmt$(r.depreciation)},
        {class:"num",value:fmt$(r.total_expense)},{class:"num",value:fmt$(r.accumulated)},
        {class:"num",value:fmt$(r.closing_nbv)},{class:"small",value:r.notes}])
    )
  );
  modal({ title: "Schedule — " + a.description, body, wide:true,
    footer: el("div",{class:"ft"},
      el("button",{class:"btn secondary",onclick:()=>downloadCSV("schedule_"+ (a.asset_number||a.id.slice(0,6)) +".csv",
        ["Year","Opening NBV","§179","Bonus","Depreciation","Total expense","Accumulated","Closing NBV","Notes"],
        rows.map(r=>[r.year,r.opening_nbv,r.sec179,r.bonus,r.depreciation,r.total_expense,r.accumulated,r.closing_nbv,r.notes]))
      },"Download CSV"),
      el("button",{class:"btn",onclick:()=>$("#modalHost").innerHTML=""},"Close")
    )
  });
}

// ---------- Transfer modal ----------
function openTransferModal(assetId) {
  const a = byId(STATE.assets, assetId); if (!a) return;
  const rec = { asset_id: assetId, from_entity_id: a.entity_id, to_entity_id:"", transfer_date: todayISO(), reason:"" };
  modal({ title:"Transfer — "+a.description,
    body: el("div",{class:"grid"},
      el("div",{class:"msg warn"},"Carryover basis: receiving entity continues the existing depreciation schedule. No basis step-up."),
      el("div",{class:"grid cols-2"},
        field("From", el("input",{type:"text",value:(byId(STATE.entities,a.entity_id)||{}).name||"—",disabled:true})),
        field("To *", entitySelect({value:rec.to_entity_id, onchange:v=>rec.to_entity_id=v})),
      ),
      el("div",{class:"grid cols-2"},
        field("Transfer date *", el("input",{type:"date",value:rec.transfer_date,oninput:e=>rec.transfer_date=e.target.value})),
        field("Reason",          el("input",{type:"text",oninput:e=>rec.reason=e.target.value})),
      ),
    ),
    saveLabel:"Record transfer",
    onSave: async() => {
      if (!rec.to_entity_id) throw new Error("Choose a destination entity");
      if (rec.to_entity_id === a.entity_id) throw new Error("From and To entities are the same");
      rec.created_by = USER.email;
      const saved = await insertRec("transfers", rec);
      await updateRec("assets", a.id, { entity_id: rec.to_entity_id, updated_at: new Date().toISOString() });
      const fromE = byId(STATE.entities, rec.from_entity_id)||{name:"?"};
      const toE = byId(STATE.entities, rec.to_entity_id)||{name:"?"};
      await logActivity("asset", a.id, "transfer",
        "Transferred "+fromE.name+" → "+toE.name+" on "+rec.transfer_date+(rec.reason?" ("+rec.reason+")":""),
        { transfer_id: saved.id });
      await refreshAll(); show("assets"); flash("Transfer recorded");
    }
  });
}

// ---------- Disposal modal ----------
function openDisposalModal(assetId) {
  const a = byId(STATE.assets, assetId); if (!a) return;
  const rec = { asset_id:assetId, disposal_date: todayISO(), disposal_type:"sold", proceeds:0, buyer:"", notes:"" };
  function refreshCalc() {
    const a2 = Object.assign({}, a, { disposal_date: rec.disposal_date });
    const actual = Depreciation.schedule(a2);       // with disposal applied
    const fullYr = Depreciation.schedule(a);        // without disposal
    const last = actual[actual.length-1];
    const acc = last ? last.accumulated : 0;
    const nbv = (+a.cost||0) - acc;
    const gl  = (+rec.proceeds||0) - nbv;

    const dispYear = new Date(rec.disposal_date).getUTCFullYear();
    const rowActual = actual.find(r=>r.year===dispYear);
    const rowFull   = fullYr.find(r=>r.year===dispYear);
    const partialDep = rowActual ? rowActual.total_expense : 0;
    const fullDep    = rowFull   ? rowFull.total_expense   : 0;
    const priorAccum = rowActual ? (rowActual.accumulated - partialDep) : acc;
    const convLabel  = CONV_LABELS[a.convention] || a.convention;
    const frac = (fullDep > 0) ? (partialDep / fullDep) : 0;
    const pct = (frac * 100).toFixed(1);

    preview.innerHTML = "";

    // Left: Gain/Loss summary
    const glCard = el("div",{style:"background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px"},
      el("div",{style:"font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px"}, "Gain / Loss math"),
      el("table",{style:"width:100%;font-size:13px"},
        el("tbody",{},
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Cost basis"),
            el("td",{class:"num",style:"text-align:right"}, fmt$(a.cost))),
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Accumulated thru "+fmtDate(rec.disposal_date)),
            el("td",{class:"num",style:"text-align:right"}, fmt$(acc))),
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Net book value at disposal"),
            el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(nbv))),
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Proceeds"),
            el("td",{class:"num",style:"text-align:right"}, fmt$(rec.proceeds||0))),
          el("tr",{style:"border-top:1px solid var(--border)"},
            el("td",{style:"padding:6px 0;font-weight:700"},"Gain / (Loss)"),
            el("td",{class:"num",style:"text-align:right;font-weight:700;color:"+(gl>=0?"var(--ok)":"var(--err)")}, fmt$(gl))),
        )
      )
    );

    // Right: convention proof for disposal year
    const proofCard = el("div",{style:"background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px"},
      el("div",{style:"font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px"},
        dispYear+" disposal-year convention proof"),
      el("table",{style:"width:100%;font-size:13px"},
        el("tbody",{},
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"IRS convention"),
            el("td",{style:"text-align:right"}, convLabel)),
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Prior-year accumulated (entering "+dispYear+")"),
            el("td",{class:"num",style:"text-align:right"}, fmt$(priorAccum))),
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Full-year "+dispYear+" dep (if not disposed)"),
            el("td",{class:"num",style:"text-align:right"}, fmt$(fullDep))),
          el("tr",{}, el("td",{style:"color:var(--muted);padding:3px 0"},"Actual partial "+dispYear+" dep (through "+fmtDate(rec.disposal_date)+")"),
            el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(partialDep))),
          el("tr",{style:"border-top:1px solid var(--border)"},
            el("td",{style:"padding:6px 0;font-weight:700"},"Fraction applied"),
            el("td",{style:"text-align:right;font-weight:700;color:var(--maroon)"}, pct+"%")),
        )
      )
    );

    preview.appendChild(el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:10px"},
      glCard, proofCard
    ));

    // Schedule table below: disposal-aware rows, highlighting disposal year
    preview.appendChild(el("div",{style:"margin-top:10px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px"},
      "Full depreciation schedule (disposal applied)"));
    const sched = el("table",{style:"width:100%;font-size:12px;margin-top:4px"});
    sched.appendChild(el("thead",{}, el("tr",{},
      ["Year","Open NBV","Full-yr dep","Actual dep","Accum","Close NBV","Notes"].map(h=>
        el("th",{style:"text-align:right;padding:4px 6px;font-size:10px;color:var(--muted);border-bottom:1px solid var(--border)"}, h))
    )));
    const tbody = el("tbody",{});
    actual.forEach(r => {
      const rowFull = fullYr.find(x=>x.year===r.year) || {total_expense:0};
      const isDispYr = r.year === dispYear;
      const tr = el("tr",{style: isDispYr ? "background:#fff4e5" : ""},
        el("td",{style:"padding:3px 6px;text-align:right;font-weight:"+(isDispYr?"700":"400")}, r.year + (isDispYr?" ⟵ disposal":"")),
        el("td",{class:"num",style:"padding:3px 6px;text-align:right"}, fmt$(r.opening_nbv)),
        el("td",{class:"num",style:"padding:3px 6px;text-align:right;color:"+(isDispYr?"var(--muted)":"inherit")}, fmt$(rowFull.total_expense)),
        el("td",{class:"num",style:"padding:3px 6px;text-align:right;font-weight:"+(isDispYr?"700":"400")}, fmt$(r.total_expense)),
        el("td",{class:"num",style:"padding:3px 6px;text-align:right"}, fmt$(r.accumulated)),
        el("td",{class:"num",style:"padding:3px 6px;text-align:right"}, fmt$(r.closing_nbv)),
        el("td",{style:"padding:3px 6px;text-align:right;font-size:10px;color:var(--muted)"}, r.notes||"")
      );
      tbody.appendChild(tr);
    });
    sched.appendChild(tbody);
    preview.appendChild(sched);
  }
  const preview = el("div",{style:"background:#faf8f5;border-radius:6px;margin-top:10px;padding:12px"});
  // Extended disposal fields: donated (with FMV), partial_sale (with ownership_pct_sold).
  rec.fmv = 0;
  rec.ownership_pct_sold = 100;
  rec.is_partial = false;
  const typeOptions = [
    ["sold","Sold"],["donated","Donated (FMV)"],["scrapped","Scrapped"],["traded","Traded"],
    ["lost","Lost"],["died","Died"],["partial_sale","Partial Sale (Trading only)"],["other","Other"]
  ];
  const fmvField = field("Donation FMV *", el("input",{type:"number",step:"0.01",min:"0",value:0,oninput:e=>{rec.fmv=+e.target.value||0; refreshCalc();}}));
  const pctField = field("% of ownership sold *", el("input",{type:"number",step:"0.0001",min:"0.0001",max:"100",value:100,oninput:e=>{rec.ownership_pct_sold=+e.target.value||0; refreshCalc();}}));
  fmvField.style.display = "none";
  pctField.style.display = "none";
  const typeSel = el("select",{onchange:e=>{
    rec.disposal_type = e.target.value;
    rec.is_partial = (rec.disposal_type === "partial_sale");
    fmvField.style.display = (rec.disposal_type === "donated") ? "" : "none";
    pctField.style.display = rec.is_partial ? "" : "none";
    refreshCalc();
  }});
  typeOptions.forEach(([v,l]) => typeSel.appendChild(el("option",{value:v}, l)));
  typeSel.value = "sold";

  modal({ title:"Dispose — "+a.description,
    body: el("div",{class:"grid"},
      (a.pool_type === "recip_mare")
        ? el("div",{class:"msg warn"},"Recip Mare: full-mare disposal. Use Sold / Died / Donated. For donations enter FMV.")
        : (a.pool_type === "trading")
          ? el("div",{class:"msg warn"},"Trading horse: Partial Sale lets you reduce ownership % without retiring the asset. Gain/loss is pro-rata.")
          : null,
      el("div",{class:"grid cols-2"},
        field("Disposal date *", el("input",{type:"date",value:rec.disposal_date,oninput:e=>{rec.disposal_date=e.target.value; refreshCalc();}})),
        field("Type", typeSel),
      ),
      el("div",{class:"grid cols-2"},
        field("Proceeds (cash received)", el("input",{type:"number",step:"0.01",min:"0",value:0,oninput:e=>{rec.proceeds=+e.target.value||0; refreshCalc();}})),
        field("Buyer / note", el("input",{type:"text",oninput:e=>rec.buyer=e.target.value})),
      ),
      el("div",{class:"grid cols-2"}, fmvField, pctField),
      field("Notes", el("textarea",{oninput:e=>rec.notes=e.target.value})),
      el("h3",{style:"margin:10px 0 2px;font-size:13px"},"Gain / loss preview"),
      preview
    ),
    saveLabel:"Record disposal",
    onSave: async () => {
      if (!rec.disposal_date) throw new Error("Pick a disposal date");
      // Re-check latest server state — prevent double-dispose (except for partial sales).
      const { data: latest } = await sb.from("assets").select("status,cost,ownership_pct").eq("id", a.id).single();
      if (latest && latest.status === "disposed" && !rec.is_partial) {
        throw new Error("This asset is already disposed. Refresh the page.");
      }
      if (rec.disposal_date > todayISO()) {
        if (!confirm("Disposal date "+rec.disposal_date+" is in the future. Record it anyway?")) return;
      }
      // Validate partial-sale specifics
      if (rec.is_partial) {
        if (a.pool_type !== "trading") throw new Error("Partial sales are only supported on Trading horses.");
        const pct = +rec.ownership_pct_sold || 0;
        if (pct <= 0 || pct > 100) throw new Error("Partial sale % must be between 0 and 100.");
        const currentPct = +(latest && latest.ownership_pct != null ? latest.ownership_pct : a.ownership_pct) || 0;
        if (pct > currentPct) throw new Error("Selling "+pct+"% but Solo only owns "+currentPct+"%.");
      }
      if (rec.disposal_type === "donated" && !(rec.fmv > 0)) {
        throw new Error("Enter the donation FMV (>0).");
      }
      // Snapshot cost/accum/nbv at disposal for audit trail
      {
        const sched = Depreciation.schedule(Object.assign({}, a, { disposal_date: rec.disposal_date }));
        const last = sched[sched.length-1];
        const acc = last ? last.accumulated : 0;
        const nbv = (+a.cost||0) - acc;
        rec.cost_retired      = rec.is_partial ? r2((+a.cost||0) * (rec.ownership_pct_sold/100)) : (+a.cost||0);
        rec.accum_dep_retired = rec.is_partial ? r2(acc * (rec.ownership_pct_sold/100)) : r2(acc);
        rec.nbv_retired       = rec.is_partial ? r2(nbv * (rec.ownership_pct_sold/100)) : r2(nbv);
      }
      rec.created_by = USER.email;
      const saved = await insertRec("disposals", rec);
      if (rec.is_partial) {
        // Reduce asset cost + ownership_pct pro-rata; asset stays ACTIVE.
        const newCost = r2((+a.cost||0) * (1 - rec.ownership_pct_sold/100));
        const newOwn  = r2((+a.ownership_pct||100) - rec.ownership_pct_sold);
        await updateRec("assets", a.id, { cost: newCost, ownership_pct: newOwn, updated_at: new Date().toISOString() });
        await logActivity("asset", a.id, "partial_sale",
          "Partial sale: "+rec.ownership_pct_sold+"% at "+fmt$(rec.proceeds||0)+" on "+rec.disposal_date+". Cost reduced to "+fmt$(newCost)+", Solo ownership now "+newOwn+"%.",
          { disposal_id: saved.id });
      } else {
        // disposal_date lives on the disposals table; only flip status here.
        // (Postgres rejects unknown columns; would surface as schema-cache error.)
        await updateRec("assets", a.id, { status: "disposed", updated_at: new Date().toISOString() });
        const summary = "Disposed ("+rec.disposal_type+"): "+
          (rec.disposal_type==="donated" ? "FMV "+fmt$(rec.fmv||0) : "proceeds "+fmt$(rec.proceeds||0)) +
          " on "+rec.disposal_date;
        await logActivity("asset", a.id, "dispose", summary, { disposal_id: saved.id });
      }
      await refreshAll(); show("assets"); flash(rec.is_partial ? "Partial sale recorded" : "Disposal recorded");
    }
  });
  refreshCalc();
}

// ============================================================
// VIEW: Asset detail (description, schedule, chart, activity log)
// ============================================================
VIEWS.asset = async function(root, ctx) {
  const id = ctx && ctx.id;
  const a = byId(STATE.assets, id);
  if (!a) { root.appendChild(el("p",{},"Asset not found.")); return; }
  const c = byId(STATE.categories, a.category_id);
  const e = byId(STATE.entities, a.entity_id);
  const y = thisYear();

  // If disposed, build two schedules side-by-side:
  //  (1) actual: with disposal_date (convention-based partial year in disposal year)
  //  (2) full-year: what the depreciation WOULD have been through EOY if not disposed
  const disp = STATE.disposals.find(d => d.asset_id === a.id);
  const actualSchedule = disp
    ? Depreciation.schedule(Object.assign({}, a, { disposal_date: disp.disposal_date }))
    : Depreciation.schedule(a);
  const fullYearSchedule = Depreciation.schedule(a); // ignores disposal

  const totalsNow = actualSchedule.find(r=>r.year===y) || actualSchedule[actualSchedule.length-1] || null;
  const nbvNow = totalsNow ? totalsNow.closing_nbv : (+a.cost||0);
  const accNow = totalsNow ? totalsNow.accumulated : 0;

  // Header
  root.appendChild(el("div",{style:"margin-bottom:10px"},
    el("a",{href:"#",style:"color:var(--maroon);text-decoration:none",onclick:ev=>{ev.preventDefault(); show("assets");}}, "← Back to assets")
  ));
  root.appendChild(el("h2",{},a.description, " ",
    el("span",{class:"chip "+(a.status==="active"?"ok":a.status==="disposed"?"err":"warn")}, a.status)));
  root.appendChild(el("div",{class:"small",style:"margin-bottom:14px"},
    [a.asset_number, a.make, a.model, a.year, a.serial_number, a.vin].filter(Boolean).join(" · ")
  ));

  // Disposal banner — if disposed, show disposal math up front
  if (disp) {
    const dispYear = new Date(disp.disposal_date).getUTCFullYear();
    const rowDispYear = actualSchedule.find(r=>r.year===dispYear);
    const fullDispYear = fullYearSchedule.find(r=>r.year===dispYear);
    const partialDep = rowDispYear ? rowDispYear.total_expense : 0;
    const fullDep = fullDispYear ? fullDispYear.total_expense : 0;
    const accThruDisposal = rowDispYear ? rowDispYear.accumulated : 0;
    const nbvAtDisposal = (+a.cost||0) - accThruDisposal;
    const gl = (+(disp.proceeds||0)) - nbvAtDisposal;
    const convLabel = CONV_LABELS[a.convention] || a.convention;
    const frac = (fullDep > 0) ? (partialDep / fullDep) : 0;
    const pct = (frac * 100).toFixed(1);

    const banner = el("div",{class:"card",style:"border-left:4px solid var(--err);margin-bottom:16px"},
      el("div",{class:"hd"}, el("h3",{style:"color:var(--err)"},"Disposed " + fmtDate(disp.disposal_date) + " — " + (disp.disposal_type||""))),
      el("div",{class:"bd"},
        el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:14px"},
          // LEFT: disposal math
          el("div",{},
            el("div",{style:"font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:6px"}, "Depreciation through disposal date"),
            el("table",{style:"width:100%"},
              el("tbody",{},
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Cost basis"), el("td",{class:"num",style:"text-align:right"}, fmt$(a.cost))),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Accumulated thru "+fmtDate(disp.disposal_date)), el("td",{class:"num",style:"text-align:right"}, fmt$(accThruDisposal))),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Net book value at disposal"), el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(nbvAtDisposal))),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Proceeds"), el("td",{class:"num",style:"text-align:right"}, fmt$(disp.proceeds||0))),
                el("tr",{style:"border-top:1px solid var(--border)"},
                  el("td",{style:"padding:6px 0;font-weight:700"},"Gain / (Loss)"),
                  el("td",{class:"num",style:"text-align:right;font-weight:700;color:"+(gl>=0?"var(--ok)":"var(--err)")}, fmt$(gl))),
              )
            )
          ),
          // RIGHT: partial-year proof
          el("div",{},
            el("div",{style:"font-size:12px;color:var(--muted);text-transform:uppercase;margin-bottom:6px"},
              "Year of disposal ("+dispYear+") — convention proof"),
            el("table",{style:"width:100%"},
              el("tbody",{},
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Convention"), el("td",{style:"text-align:right"}, convLabel)),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Full-year depreciation (if not disposed)"), el("td",{class:"num",style:"text-align:right"}, fmt$(fullDep))),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Actual (partial) " + dispYear + " depreciation"), el("td",{class:"num",style:"text-align:right;font-weight:600"}, fmt$(partialDep))),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted)"},"Fraction applied"), el("td",{style:"text-align:right;font-weight:600"}, pct + "%")),
                el("tr",{}, el("td",{style:"padding:3px 0;color:var(--muted);font-size:11px"},"Buyer / notes"), el("td",{style:"text-align:right;font-size:12px"}, (disp.buyer||"")+(disp.notes?" — "+disp.notes:""))),
              )
            )
          ),
        )
      )
    );
    root.appendChild(banner);
  }

  // Action bar
  const actions = el("div",{class:"row-bar",style:"margin-bottom:14px"},
    el("button",{class:"btn secondary",onclick:()=>openAssetModal(a.id)},"Edit"),
    el("button",{class:"btn secondary",onclick:()=>openScheduleModal(a.id)},"Full schedule"),
    a.status==="active" && el("button",{class:"btn secondary",onclick:()=>openTransferModal(a.id)},"Transfer"),
    a.status==="active" && el("button",{class:"btn secondary",onclick:()=>openDisposalModal(a.id)},"Dispose"),
  );
  root.appendChild(actions);

  // KPI row
  root.appendChild(el("div",{class:"kpi-row"},
    kpi("Cost basis", fmt$(a.cost)),
    kpi((disp?"Disposal-year":y)+" depreciation", fmt$(totalsNow?totalsNow.total_expense:0)),
    kpi("Accumulated", fmt$(accNow)),
    kpi(disp?"NBV at disposal":"Net book value", fmt$(nbvNow), disp?"":"End of "+y),
  ));

  // Two-column: info card + chart
  const grid = el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px"});
  root.appendChild(grid);

  const info = el("table",{style:"width:100%"});
  const rows = [
    ["Category", c?c.name:"—"],
    ["Entity", e?e.name:"—"],
    ["In-service date", fmtDate(a.in_service_date)],
    ["Method", a.is_inventory ? "Inventory (not depreciated)" : (METHOD_LABELS[a.method]||a.method)],
    ["Life", a.is_inventory ? "—" : (a.life_years||"")+" years"],
    ["Convention", a.is_inventory ? "—" : (CONV_LABELS[a.convention]||a.convention)],
    ["Bonus %", a.is_inventory ? "—" : (a.bonus_pct||0)+"%"],
    ["§179", fmt$(a.section_179||0)],
    ["Salvage", fmt$(a.salvage_value||0)],
    ["Location", a.location||"—"],
    ["Vendor", a.vendor||"—"],
    ["Invoice #", a.invoice_number||"—"],
    ["Notes", a.notes||"—"],
  ];
  if (a.pool_type) {
    const poolLabel = a.pool_type==="recip_mare" ? "Recip Mare"
                    : a.pool_type==="trading"    ? "Horse (trading/stallion)"
                    : a.pool_type==="property"   ? "Property sub-asset" : a.pool_type;
    rows.unshift(["Pool", poolLabel]);
    if (a.property_group) {
      const link = el("a",{href:"#",style:"color:var(--maroon)",onclick:ev=>{ev.preventDefault(); show("properties");}}, a.property_group);
      rows.splice(1,0, ["Property", link]);
    }
    if (a.bucket_tag) rows.splice(1,0, ["Bucket", a.bucket_tag]);
    if (a.pool_type==="trading") rows.splice(1,0, ["Solo ownership", (a.ownership_pct==null?100:a.ownership_pct)+"%"]);
    if (a.foaling_year||a.color||a.sex||a.sire||a.dam) rows.splice(1,0, ["Horse", horseDisplayName(a) || "—"]);
    if ((a.co_owners||[]).length) rows.splice(2,0, ["Co-owners", a.co_owners.map(o=>o.name+" "+o.pct+"%").join(", ")]);
  }
  if (a.is_land) rows.unshift(["Land", "Not depreciated"]);
  rows.forEach(([k,v])=>info.appendChild(el("tr",{},
    el("td",{style:"color:var(--muted);width:40%;font-size:12px"}, k),
    el("td",{style:"font-weight:500"}, v)
  )));
  grid.appendChild(card("Details", info));

  // Chart: bar chart of NBV and depreciation over schedule years (skip for inventory)
  if (!a.is_inventory && actualSchedule.length) {
    grid.appendChild(card("Depreciation by year", buildDepChart(actualSchedule)));
  } else if (a.is_inventory) {
    grid.appendChild(card("Inventory item", el("div",{class:"small"},
      "Not depreciated. Cost sits on the balance sheet until sold, at which point it hits COGS.")));
  }

  // Photos strip
  if ((a.photos||[]).length) {
    const photoStrip = el("div",{style:"display:flex;flex-wrap:wrap;gap:8px;padding:8px"});
    a.photos.forEach(ph => {
      photoStrip.appendChild(el("a",{href: ph.url||ph, target:"_blank"},
        el("img",{src: ph.url||ph, style:"width:140px;height:140px;object-fit:cover;border-radius:6px;border:1px solid var(--border)"})
      ));
    });
    root.appendChild(card("Photos ("+a.photos.length+")", photoStrip));
  }

  // Full schedule (compact) — uses actual (disposal-aware) schedule
  root.appendChild(card(disp?"Schedule (with disposal applied)":"Schedule", tableEl(
    ["Year",{label:"Open NBV",class:"num"},{label:"§179",class:"num"},{label:"Bonus",class:"num"},{label:"Dep.",class:"num"},{label:"Total exp.",class:"num"},{label:"Accum.",class:"num"},{label:"Close NBV",class:"num"},"Notes"],
    actualSchedule.map(r=>[r.year,{class:"num",value:fmt$(r.opening_nbv)},{class:"num",value:fmt$(r.sec179)},
      {class:"num",value:fmt$(r.bonus)},{class:"num",value:fmt$(r.depreciation)},
      {class:"num",value:fmt$(r.total_expense)},{class:"num",value:fmt$(r.accumulated)},
      {class:"num",value:fmt$(r.closing_nbv)},{class:"small",value:r.notes}])
  )));

  // For disposed assets, also show the full-year schedule side-by-side so Chris can verify partial-year math
  if (disp) {
    root.appendChild(card("Full-year schedule (for comparison — assumes no disposal)", tableEl(
      ["Year",{label:"Open NBV",class:"num"},{label:"§179",class:"num"},{label:"Bonus",class:"num"},{label:"Dep.",class:"num"},{label:"Total exp.",class:"num"},{label:"Accum.",class:"num"},{label:"Close NBV",class:"num"},"Notes"],
      fullYearSchedule.map(r=>[r.year,{class:"num",value:fmt$(r.opening_nbv)},{class:"num",value:fmt$(r.sec179)},
        {class:"num",value:fmt$(r.bonus)},{class:"num",value:fmt$(r.depreciation)},
        {class:"num",value:fmt$(r.total_expense)},{class:"num",value:fmt$(r.accumulated)},
        {class:"num",value:fmt$(r.closing_nbv)},{class:"small",value:r.notes}])
    )));
  }

  // Activity log for this asset
  const logCard = el("div",{class:"card"},
    el("div",{class:"hd"}, el("h3",{},"Activity log"), el("span",{class:"small",style:"margin-left:8px;color:var(--muted)"},"Most recent first")),
    el("div",{class:"bd tight",id:"assetLogBd"}, el("div",{class:"small",style:"padding:14px"},"Loading…"))
  );
  root.appendChild(logCard);
  try {
    const { data: logs, error } = await sb.from("activity_log")
      .select("*").eq("entity_id", a.id).order("ts",{ascending:false}).limit(500);
    const bd = logCard.querySelector("#assetLogBd");
    bd.innerHTML = "";
    if (error) { bd.appendChild(el("div",{class:"small",style:"padding:14px;color:var(--err)"}, "Log unavailable: "+error.message+" (run the activity_log migration)")); return; }
    if (!logs || !logs.length) { bd.appendChild(el("div",{class:"small",style:"padding:14px"},"No activity recorded yet.")); return; }
    bd.appendChild(tableEl(
      ["When","User","Action","Summary"],
      logs.map(l=>[new Date(l.ts).toLocaleString(), l.user_email||"", l.action||"", l.summary||""])
    ));
  } catch(e) {
    const bd = logCard.querySelector("#assetLogBd");
    bd.innerHTML="";
    bd.appendChild(el("div",{class:"small",style:"padding:14px;color:var(--muted)"},"Log unavailable: "+e.message));
  }
};

function buildDepChart(schedule) {
  if (!schedule || !schedule.length) return el("div",{class:"bd",style:"padding:18px"},"No schedule");
  const W = 420, H = 220, P = 30;
  const maxCost = Math.max.apply(null, schedule.map(r => Math.max(r.opening_nbv, r.total_expense, r.closing_nbv))) || 1;
  const barW = (W - P*2) / (schedule.length * 2 + 1);
  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox","0 0 "+W+" "+H);
  svg.setAttribute("style","width:100%;height:auto");
  // axes
  const axis = document.createElementNS(svgNS,"line");
  axis.setAttribute("x1",P); axis.setAttribute("y1",H-P); axis.setAttribute("x2",W-P); axis.setAttribute("y2",H-P);
  axis.setAttribute("stroke","#ccc"); svg.appendChild(axis);
  schedule.forEach((r,i)=>{
    const x0 = P + i*(barW*2+4) + 4;
    const depH = (r.total_expense / maxCost) * (H-P*2);
    const nbvH = (r.closing_nbv / maxCost) * (H-P*2);
    const b1 = document.createElementNS(svgNS,"rect");
    b1.setAttribute("x",x0); b1.setAttribute("y",H-P-depH); b1.setAttribute("width",barW); b1.setAttribute("height",depH);
    b1.setAttribute("fill","#8b1a1a"); svg.appendChild(b1);
    const b2 = document.createElementNS(svgNS,"rect");
    b2.setAttribute("x",x0+barW+1); b2.setAttribute("y",H-P-nbvH); b2.setAttribute("width",barW); b2.setAttribute("height",nbvH);
    b2.setAttribute("fill","#c9a227"); svg.appendChild(b2);
    const lab = document.createElementNS(svgNS,"text");
    lab.setAttribute("x",x0+barW); lab.setAttribute("y",H-P+12);
    lab.setAttribute("font-size","10"); lab.setAttribute("text-anchor","middle"); lab.setAttribute("fill","#666");
    lab.textContent = r.year;
    svg.appendChild(lab);
  });
  const legend = el("div",{style:"font-size:11px;color:var(--muted);padding:8px 14px 14px"},
    el("span",{style:"display:inline-block;width:10px;height:10px;background:#8b1a1a;margin-right:4px;border-radius:2px"}),
    "Total expense",
    el("span",{style:"display:inline-block;width:10px;height:10px;background:#c9a227;margin:0 4px 0 14px;border-radius:2px"}),
    "Closing NBV"
  );
  const wrap = el("div",{class:"bd",style:"padding:14px"});
  wrap.appendChild(svg);
  wrap.appendChild(legend);
  return wrap;
}

// ============================================================
// VIEW: Disposals
// ============================================================
VIEWS.disposals = function(root) {
  root.appendChild(el("h2",{},"Disposals ", el("small",{},STATE.disposals.length+" on file")));
  const rows = STATE.disposals.map(d => {
    const a = byId(STATE.assets, d.asset_id);
    let gainLoss = "";
    // Prefer snapshot fields (cost_retired/accum_dep_retired/nbv_retired) if present.
    const nbvRetired = d.nbv_retired != null ? +d.nbv_retired : null;
    const considered = (d.disposal_type === "donated" ? (+d.fmv||0) : (+d.proceeds||0));
    if (nbvRetired != null) {
      gainLoss = fmt$(considered - nbvRetired);
    } else if (a) {
      const a2 = Object.assign({}, a, { disposal_date: d.disposal_date });
      const rs = Depreciation.schedule(a2);
      const acc = rs.length ? rs[rs.length-1].accumulated : 0;
      const nbv = (+a.cost||0) - acc;
      gainLoss = fmt$(considered - nbv);
    }
    const assetLink = a ? (() => {
      const L = el("a",{href:"#",style:"color:var(--maroon);cursor:pointer"},a.description);
      L.onclick = ev=>{ev.preventDefault(); show("asset",{id:a.id});};
      return L;
    })() : "(deleted asset)";
    const typeLabel = (d.disposal_type||"") + (d.is_partial ? " ("+(d.ownership_pct_sold||0)+"%)" : "");
    const proceedsShown = d.disposal_type === "donated"
      ? "FMV "+fmt$(d.fmv||0)+(d.proceeds?" + $"+(+d.proceeds||0):"")

    return [
      fmtDate(d.disposal_date),

      typeLabel,
      {class:"num",value: d.cost_retired != null ? fmt$(d.cost_retired) : (a?fmt$(a.cost):"")},

  )));
};
async function unwindDisposal(dispId) {
  const d = byId(STATE.disposals, dispId); if (!d) return;
  const a = byId(STATE.assets, d.asset_id);
  const isPartial = !!d.is_partial;
  const msg = isPartial
    ? "Unwind this partial sale? "+(d.ownership_pct_sold||0)+"% will be added back to Solo's ownership and the cost restored."
    : "Unwind this disposal? The asset ("+(a?a.description:"unknown")+") will be set back to active and the disposal record removed.";
  confirmModal(msg,
    async () => {
      await remove("disposals", dispId);
      if (a) {
        if (isPartial) {
          // Restore cost (add back the retired portion) + ownership_pct
          const restoredCost = r2((+a.cost||0) + (+d.cost_retired||0));
          const restoredOwn  = r2((+a.ownership_pct||0) + (+d.ownership_pct_sold||0));
          await updateRec("assets", a.id, { cost: restoredCost, ownership_pct: restoredOwn, updated_at: new Date().toISOString() });
        } else {
          // disposal_date isn't a column on assets; just flip the status back.
          await updateRec("assets", a.id, { status:"active", updated_at:new Date().toISOString() });
        }
      }
      await logActivity("asset", a?a.id:null, "unwind_dispose",
        "Unwound "+(isPartial?"partial sale":"disposal")+" dated "+fmtDate(d.disposal_date)+" ("+(d.disposal_type||"")+", proceeds "+fmt$(d.proceeds||0)+(d.fmv?", FMV "+fmt$(d.fmv):"")+")",
        { disposal_id: dispId });
      await refreshAll(); show("disposals"); flash((isPartial?"Partial sale":"Disposal")+" unwound");
    });
}
