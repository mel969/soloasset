function renderRollforward(year, setCsv) {
  // For each entity: opening NBV (end of year-1), plus cost acquired in year, minus cost of disposals in year,
  // minus depreciation for year, = ending NBV.
  const lines = [];
  const entityGroups = {};
  STATE.assets.forEach(a => {
    const eName = (byId(STATE.entities, a.entity_id)||{}).name || "Unassigned";
    (entityGroups[eName] = entityGroups[eName] || []).push(a);
  });
  const headers = ["Entity","Open cost","Additions","Dispositions (cost)","Close cost","Open accum.","Depreciation","Disp. accum.","Close accum.","Close NBV"];
  const rows = [];
  let T = {oc:0,add:0,dc:0,cc:0,oa:0,d:0,da:0,ca:0,nbv:0};
  Object.keys(entityGroups).sort().forEach(ename => {
    const list = entityGroups[ename];
    let oc=0,add=0,dc=0,cc=0,oa=0,dep=0,da=0,ca=0;
    list.forEach(a => {
      const inY = new Date(a.in_service_date).getFullYear();
      const dispY = STATE.disposals.find(d=>d.asset_id===a.id);
      const dispYearActual = dispY ? new Date(dispY.disposal_date).getFullYear() : null;

      // cost state
      if (inY < year) oc += +a.cost||0;
      if (inY === year) add += +a.cost||0;
      if (dispYearActual === year) dc += +a.cost||0;
      // ending cost = active at end of year
      if (inY <= year && (dispYearActual==null || dispYearActual > year)) cc += +a.cost||0;
      if (inY === year && dispYearActual === year) cc += 0; // bought and sold same year -> end = 0

      // depreciation state
      const priorRows = Depreciation.schedule(a, year-1);
      const prAcc = priorRows.length ? priorRows[priorRows.length-1].accumulated : 0;
      if (inY < year) oa += prAcc;

      // depreciation for THIS year
      const withDisp = dispYearActual === year
        ? Object.assign({}, a, { disposal_date: dispY.disposal_date })
        : a;
      const schedY = Depreciation.schedule(withDisp, year).find(r=>r.year===year);
      const yExp = schedY ? schedY.total_expense : 0;
      dep += yExp;

      // disp accum
      if (dispYearActual === year) {
        da += (schedY ? schedY.accumulated : prAcc + yExp);
      }

      // closing accum for still-held assets
      if (inY <= year && (dispYearActual==null || dispYearActual > year)) {
        ca += (schedY ? schedY.accumulated : prAcc);
      }
    });
    rows.push([ename,
      {class:"num",value:fmt$(oc)},{class:"num",value:fmt$(add)},{class:"num",value:fmt$(dc)},
      {class:"num",value:fmt$(cc)},{class:"num",value:fmt$(oa)},{class:"num",value:fmt$(dep)},
      {class:"num",value:fmt$(da)},{class:"num",value:fmt$(ca)},{class:"num",value:fmt$(cc-ca)}
    ]);
    T.oc+=oc;T.add+=add;T.dc+=dc;T.cc+=cc;T.oa+=oa;T.d+=dep;T.da+=da;T.ca+=ca;T.nbv+=cc-ca;
  });
  rows.push([el("b",{},"TOTAL"),
    {class:"num",value:el("b",{},fmt$(T.oc))},{class:"num",value:el("b",{},fmt$(T.add))},{class:"num",value:el("b",{},fmt$(T.dc))},
    {class:"num",value:el("b",{},fmt$(T.cc))},{class:"num",value:el("b",{},fmt$(T.oa))},{class:"num",value:el("b",{},fmt$(T.d))},
    {class:"num",value:el("b",{},fmt$(T.da))},{class:"num",value:el("b",{},fmt$(T.ca))},{class:"num",value:el("b",{},fmt$(T.nbv))}]);
  setCsv({filename:"rollforward_"+year+".csv",headers,rows:rows.map(r=>r.map(c=>{
    if (c && typeof c==="object") {
      if (c.nodeType) return c.textContent;
      if (c.value && c.value.nodeType) return c.value.textContent;
      if (c.value!=null) return c.value.toString().replace(/[$,]/g,"");
    } return c;
  }))});
  return card("Asset roll-forward — "+year, tableEl([{label:"Entity"},
    {label:"Open cost",class:"num"},{label:"+Additions",class:"num"},{label:"−Dispositions",class:"num"},
    {label:"=Close cost",class:"num"},{label:"Open accum.",class:"num"},{label:"+Depreciation",class:"num"},
    {label:"−Disp. accum.",class:"num"},{label:"=Close accum.",class:"num"},{label:"Close NBV",class:"num"}], rows));
}

function renderScheduleReport(opts, setCsv, asOf) {
  // opts: { year, period?: {start,end}, groupBy: 'none'|'entity'|'entity_category', showMonthly: bool }
  const { year, period, groupBy, showMonthly } = opts;
  const mode = period ? "period" : "year";
  // Filter: assets placed in service on/before end of window
  const windowEndY = period ? new Date(period.end).getUTCFullYear() : year;
  const list = STATE.assets.filter(a => new Date(a.in_service_date).getUTCFullYear() <= windowEndY);
  list.sort((a,b)=>new Date(a.in_service_date) - new Date(b.in_service_date));

  // Per-asset compute
  function compute(a) {
    if (mode === "period") {
      const r = assetPeriodDep(a, period.start, period.end);
      return { cost:+a.cost||0, prior:r.priorAccum, expense:r.periodExpense, end:r.endAccum, nbv:r.endNBV, monthly:r.monthly };
    }
    const disp = STATE.disposals.find(d=>d.asset_id===a.id);
    const effective = (disp && !disp.is_partial && new Date(disp.disposal_date).getUTCFullYear()===year)
      ? Object.assign({}, a, { disposal_date: disp.disposal_date }) : a;
    const rs = Depreciation.schedule(effective, year, asOf);
    const pr = (Depreciation.schedule(a, year-1).slice(-1)[0]||{}).accumulated || 0;
    const cur = rs.find(r=>r.year===year) || (rs.length? rs[rs.length-1] : null);
    const yExp = cur ? cur.total_expense : 0;
    const end = cur ? cur.accumulated : pr;
    return { cost:+a.cost||0, prior:pr, expense:yExp, end, nbv:(+a.cost||0)-end, monthly:null };
  }

  // Column set (base + optional monthly columns)
  const expenseLabel = mode==="period"
    ? ("Dep. " + period.start + " → " + period.end)
    : (year + " dep.");
  const monthKeys = [];
  if (showMonthly) {
    if (mode === "period") {
      // enumerate months between period.start and period.end
      const s = new Date(period.start+"T00:00:00Z"), e = new Date(period.end+"T00:00:00Z");
      let cur = new Date(Date.UTC(s.getUTCFullYear(), s.getUTCMonth(), 1));
      while (cur <= e) {
        monthKeys.push(cur.getUTCFullYear()+"-"+String(cur.getUTCMonth()+1).padStart(2,"0"));
        cur = new Date(Date.UTC(cur.getUTCFullYear(), cur.getUTCMonth()+1, 1));
      }
    } else {
      // Full year
      for (let m=1; m<=12; m++) monthKeys.push(year+"-"+String(m).padStart(2,"0"));
    }
  }
  const baseHeaders = ["Asset","In service","Cost","Prior accum.",expenseLabel];
  const tailHeaders = ["End accum.","End NBV","Status"];
  const headers = [...baseHeaders, ...monthKeys, ...tailHeaders];

  // Grouping
  function entityName(a) { return (byId(STATE.entities,a.entity_id)||{}).name || "Unassigned"; }
  function categoryName(a) { return (byId(STATE.categories,a.category_id)||{}).name || "Uncategorized"; }

  const groups = {}; // entity -> category -> [assets] OR entity -> [assets] OR "_" -> [assets]
  list.forEach(a => {
    if (groupBy === "none") {
      (groups._ = groups._ || []).push(a);
    } else if (groupBy === "entity") {
      const k = entityName(a);
      (groups[k] = groups[k] || []).push(a);
    } else { // entity_category
      const k1 = entityName(a), k2 = categoryName(a);
      groups[k1] = groups[k1] || {};
      (groups[k1][k2] = groups[k1][k2] || []).push(a);
    }
  });

  const rows = [];
  const T = { cost:0, pr:0, d:0, end:0, nbv:0 };
  const monthTotals = {}; monthKeys.forEach(k => monthTotals[k]=0);

  function assetRow(a) {
    const c = byId(STATE.categories,a.category_id);
    const e = byId(STATE.entities,a.entity_id);
    const r = compute(a);
    T.cost+=r.cost; T.pr+=r.prior; T.d+=r.expense; T.end+=r.end; T.nbv+=r.nbv;
    const monthCells = monthKeys.map(k => {
      const v = (r.monthly && r.monthly[k]) || 0;
      monthTotals[k] = (monthTotals[k]||0) + v;
      return {class:"num",value:fmt$(v)};
    });
    return [
      (groupBy==="none" ? (e?e.name+" · ":"")+(c?c.name+" · ":"") : "") + a.description + (a.asset_number?" ("+a.asset_number+")":""),
      fmtDate(a.in_service_date),
      {class:"num",value:fmt$(r.cost)},
      {class:"num",value:fmt$(r.prior)},
      {class:"num",value:fmt$(r.expense)},
      ...monthCells,
      {class:"num",value:fmt$(r.end)},
      {class:"num",value:fmt$(r.nbv)},
      el("span",{class:"chip "+(a.status==="active"?"ok":a.status==="disposed"?"err":"warn")}, a.status)
    ];
  }
  function headerRow(label, level=1) {
    const bg = level===1 ? "#eee5d8" : "#f2ece2";
    const cell = el("td",{colspan:String(headers.length),style:"background:"+bg+";font-weight:700;padding:4px 8px;border-top:1px solid var(--border)"}, label);
    return [cell];
  }
  function subtotalRow(label, S, mTot) {
    const monthCells = monthKeys.map(k => ({class:"num",value:el("b",{},fmt$(mTot[k]||0))}));
    return [
      el("b",{style:"padding-left:12px"},"  ↳ "+label),
      "", {class:"num",value:el("b",{},fmt$(S.cost))},
      {class:"num",value:el("b",{},fmt$(S.pr))},
      {class:"num",value:el("b",{},fmt$(S.d))},
      ...monthCells,
      {class:"num",value:el("b",{},fmt$(S.end))},
      {class:"num",value:el("b",{},fmt$(S.nbv))},
      ""
    ];
  }

  if (groupBy === "none") {
    (groups._ || []).forEach(a => rows.push(assetRow(a)));
  } else if (groupBy === "entity") {
    Object.keys(groups).sort().forEach(ename => {
      rows.push(headerRow("Entity: " + ename, 1));
      const eTot = { cost:0, pr:0, d:0, end:0, nbv:0 };
      const mTot = {}; monthKeys.forEach(k => mTot[k]=0);
      groups[ename].forEach(a => {
        const before = { cost:T.cost, pr:T.pr, d:T.d, end:T.end, nbv:T.nbv, m:{} };
        monthKeys.forEach(k => before.m[k] = monthTotals[k]||0);
        rows.push(assetRow(a));
        eTot.cost+=T.cost-before.cost; eTot.pr+=T.pr-before.pr; eTot.d+=T.d-before.d; eTot.end+=T.end-before.end; eTot.nbv+=T.nbv-before.nbv;
        monthKeys.forEach(k => mTot[k] += (monthTotals[k]||0) - (before.m[k]||0));
      });
      rows.push(subtotalRow("Entity "+ename+" subtotal", eTot, mTot));
    });
  } else { // entity_category
    Object.keys(groups).sort().forEach(ename => {
      rows.push(headerRow("Entity: " + ename, 1));
      const eTot = { cost:0, pr:0, d:0, end:0, nbv:0 };
      const emTot = {}; monthKeys.forEach(k => emTot[k]=0);
      const cats = groups[ename];
      Object.keys(cats).sort().forEach(cname => {
        rows.push(headerRow("  " + cname, 2));
        const cTot = { cost:0, pr:0, d:0, end:0, nbv:0 };
        const cmTot = {}; monthKeys.forEach(k => cmTot[k]=0);
        cats[cname].forEach(a => {
          const before = { cost:T.cost, pr:T.pr, d:T.d, end:T.end, nbv:T.nbv, m:{} };
          monthKeys.forEach(k => before.m[k] = monthTotals[k]||0);
          rows.push(assetRow(a));
          cTot.cost+=T.cost-before.cost; cTot.pr+=T.pr-before.pr; cTot.d+=T.d-before.d; cTot.end+=T.end-before.end; cTot.nbv+=T.nbv-before.nbv;
          monthKeys.forEach(k => cmTot[k] += (monthTotals[k]||0) - (before.m[k]||0));
        });
        rows.push(subtotalRow(cname+" subtotal", cTot, cmTot));
        eTot.cost+=cTot.cost; eTot.pr+=cTot.pr; eTot.d+=cTot.d; eTot.end+=cTot.end; eTot.nbv+=cTot.nbv;
        monthKeys.forEach(k => emTot[k] += cmTot[k]);
      });
      rows.push(subtotalRow("Entity "+ename+" subtotal", eTot, emTot));
    });
  }

  // Grand total
  {
    const mCells = monthKeys.map(k => ({class:"num",value:el("b",{},fmt$(monthTotals[k]||0))}));
    rows.push([el("b",{},"GRAND TOTAL"),"",{class:"num",value:el("b",{},fmt$(T.cost))},
      {class:"num",value:el("b",{},fmt$(T.pr))},{class:"num",value:el("b",{},fmt$(T.d))},
      ...mCells,
      {class:"num",value:el("b",{},fmt$(T.end))},{class:"num",value:el("b",{},fmt$(T.nbv))},""]);
  }

  const filename = mode === "period"
    ? "depreciation_schedule_"+period.start+"_to_"+period.end+".csv"
    : "depreciation_schedule_"+year+".csv";
  setCsv({filename, headers, rows: rows.map(r=>r.map(c=>{
    if (c && typeof c==="object") {
      if (c.nodeType) return c.textContent;
      if (c.value && c.value.nodeType) return c.value.textContent;
      if (c.value!=null) return c.value.toString().replace(/[$,]/g,"");
    } return c; }))});

  const title = mode==="period"
    ? "Depreciation schedule — "+period.start+" to "+period.end
    : "Depreciation schedule — "+year;
  const headerDefs = headers.map((h,i)=>{
    if (i===0 || i===1) return h;
    if (i===headers.length-1) return h; // status
    return {label:h, class:"num"};
  });
  return card(title, tableEl(headerDefs, rows));
}

function renderDisposalReport(opts, setCsv) {
  // opts: { year, period?: {start,end}, groupBy }
  const { year, period, groupBy } = opts;
  const mode = period ? "period" : "year";
  // Filter disposals in window
  const list = STATE.disposals.filter(d => {
    if (!d.disposal_date) return false;
    if (mode === "period") return d.disposal_date >= period.start && d.disposal_date <= period.end;
    return new Date(d.disposal_date).getUTCFullYear() === year;
  }).sort((a,b)=>new Date(a.disposal_date) - new Date(b.disposal_date));

  const headers = ["Date","Asset","Type","Cost/Retired","Accum.","NBV","Proceeds/FMV","Gain/(Loss)","Buyer","Notes"];

  function entityName(a) { return a ? ((byId(STATE.entities,a.entity_id)||{}).name || "Unassigned") : "(deleted)"; }
  function categoryName(a) { return a ? ((byId(STATE.categories,a.category_id)||{}).name || "Uncategorized") : "—"; }

  const groups = {};
  list.forEach(d => {
    const a = byId(STATE.assets, d.asset_id);
    const k1 = entityName(a);
    const k2 = categoryName(a);
    if (groupBy === "none") {
      (groups._ = groups._ || []).push({d,a});
    } else if (groupBy === "entity") {
      (groups[k1] = groups[k1] || []).push({d,a});
    } else {
      groups[k1] = groups[k1] || {};
      (groups[k1][k2] = groups[k1][k2] || []).push({d,a});
    }
  });

  function rowFor({d,a}) {
    let cost, acc, nbv, considered, gl;
    if (d.cost_retired != null) {
      cost = +d.cost_retired;
      acc  = +d.accum_dep_retired || 0;
      nbv  = +d.nbv_retired || 0;
    } else if (a) {
      const rs = Depreciation.schedule(Object.assign({}, a, { disposal_date: d.disposal_date }));
      const last = rs[rs.length-1]; acc = last ? last.accumulated : 0;
      cost = +a.cost||0; nbv = cost - acc;
    } else { cost=acc=nbv=0; }
    considered = d.disposal_type === "donated" ? (+d.fmv||0) : (+d.proceeds||0);
    gl = considered - nbv;
    const typeLabel = (d.disposal_type||"") + (d.is_partial ? " ("+(d.ownership_pct_sold||0)+"%)" : "");
    const proceedsShown = d.disposal_type === "donated"
      ? "FMV "+fmt$(d.fmv||0)+(d.proceeds?" + $"+(+d.proceeds||0):"")
      : fmt$(d.proceeds||0);
    return { row: [fmtDate(d.disposal_date), a?a.description:"(deleted)", typeLabel,
      {class:"num",value:fmt$(cost)},{class:"num",value:fmt$(acc)},{class:"num",value:fmt$(nbv)},
      {class:"num",value:proceedsShown},{class:"num",value:fmt$(gl)}, d.buyer||"", d.notes||""],
      cost, acc, nbv, p: considered, gl
    };
  }

  const rows = [];
  const T = {cost:0,acc:0,nbv:0,p:0,gl:0};
  function headerRow(label, level=1) {
    const bg = level===1 ? "#eee5d8" : "#f2ece2";
    return [ el("td",{colspan:String(headers.length),style:"background:"+bg+";font-weight:700;padding:4px 8px;border-top:1px solid var(--border)"}, label) ];
  }
  function subtotalRow(label, S) {
    return ["", el("b",{},"  ↳ "+label), "",
      {class:"num",value:el("b",{},fmt$(S.cost))},{class:"num",value:el("b",{},fmt$(S.acc))},
      {class:"num",value:el("b",{},fmt$(S.nbv))},{class:"num",value:el("b",{},fmt$(S.p))},
      {class:"num",value:el("b",{},fmt$(S.gl))},"",""];
  }

  if (groupBy === "none") {
    (groups._ || []).forEach(item => {
      const r = rowFor(item);
      rows.push(r.row);
      T.cost+=r.cost; T.acc+=r.acc; T.nbv+=r.nbv; T.p+=r.p; T.gl+=r.gl;
    });
  } else if (groupBy === "entity") {
    Object.keys(groups).sort().forEach(ename => {
      rows.push(headerRow("Entity: "+ename, 1));
      const S = {cost:0,acc:0,nbv:0,p:0,gl:0};
      groups[ename].forEach(item => {
        const r = rowFor(item); rows.push(r.row);
        S.cost+=r.cost; S.acc+=r.acc; S.nbv+=r.nbv; S.p+=r.p; S.gl+=r.gl;
      });
      rows.push(subtotalRow("Entity "+ename+" subtotal", S));
      T.cost+=S.cost; T.acc+=S.acc; T.nbv+=S.nbv; T.p+=S.p; T.gl+=S.gl;
    });
  } else { // entity_category
    Object.keys(groups).sort().forEach(ename => {
      rows.push(headerRow("Entity: "+ename, 1));
      const eS = {cost:0,acc:0,nbv:0,p:0,gl:0};
      const cats = groups[ename];
      Object.keys(cats).sort().forEach(cname => {
        rows.push(headerRow("  "+cname, 2));
        const cS = {cost:0,acc:0,nbv:0,p:0,gl:0};
        cats[cname].forEach(item => {
          const r = rowFor(item); rows.push(r.row);
          cS.cost+=r.cost; cS.acc+=r.acc; cS.nbv+=r.nbv; cS.p+=r.p; cS.gl+=r.gl;
        });
        rows.push(subtotalRow(cname+" subtotal", cS));
        eS.cost+=cS.cost; eS.acc+=cS.acc; eS.nbv+=cS.nbv; eS.p+=cS.p; eS.gl+=cS.gl;
      });
      rows.push(subtotalRow("Entity "+ename+" subtotal", eS));
      T.cost+=eS.cost; T.acc+=eS.acc; T.nbv+=eS.nbv; T.p+=eS.p; T.gl+=eS.gl;
    });
  }

  rows.push(["","",el("b",{},"GRAND TOTAL"),
    {class:"num",value:el("b",{},fmt$(T.cost))},{class:"num",value:el("b",{},fmt$(T.acc))},
    {class:"num",value:el("b",{},fmt$(T.nbv))},{class:"num",value:el("b",{},fmt$(T.p))},
    {class:"num",value:el("b",{},fmt$(T.gl))},"",""]);

  const filename = mode==="period"
    ? "disposals_"+period.start+"_to_"+period.end+".csv"
    : "disposals_"+year+".csv";
  setCsv({filename, headers, rows: rows.map(r=>r.map(c=>{
    if (c && typeof c==="object") {
      if (c.nodeType) return c.textContent;
      if (c.value && c.value.nodeType) return c.value.textContent;
      if (c.value!=null) return c.value.toString().replace(/[$,]/g,"");
    } return c; }))});

  const title = mode==="period"
    ? "Disposal report — "+period.start+" to "+period.end
    : "Disposal report — "+year;
  const headerDefs = headers.map((h,i)=>[3,4,5,6,7].includes(i)?{label:h,class:"num"}:h);
  return card(title, tableEl(headerDefs, rows));
}

// ---------- Form 4797: Sales of Business Property ----------
// For each asset disposed in the tax year, computes §1245 ordinary recapture
// and the remaining §1231 gain (long-term capital). Loss → all §1231.
// §1245 personal property (most equipment, livestock incl. recip mares & horses,
// fences) recaptures the lesser of total gain or total depreciation as ordinary.
// §1250 real property — current simplification: post-1986 SL property has no
// "additional depreciation" so 0 ordinary recapture; full gain is §1231.
function renderForm4797(year, setCsv) {
  const disps = STATE.disposals
    .filter(d => new Date(d.disposal_date).getFullYear() === year)
    .map(d => ({ d, a: byId(STATE.assets, d.asset_id) }))
    .filter(x => x.a)
    .sort((x,y2) => new Date(x.d.disposal_date) - new Date(y2.d.disposal_date));

  const groups = { "1245": [], "1250": [], "none": [] };
  const T = { proceeds:0, cost:0, accum:0, basis:0, gl:0, sec1245:0, sec1231:0 };

  disps.forEach(({d, a}) => {
    const a2 = Object.assign({}, a, { disposal_date: d.disposal_date });
    const sched = Depreciation.schedule(a2);
    const last = sched[sched.length - 1];
    const accum = last ? last.accumulated : (+a.prior_accum_dep || 0);
    const totalCost = (+a.cost||0) + (+a.improvements_cost||0);
    const proceeds = +d.proceeds || 0;
    const basis = totalCost - accum;
    const gl = proceeds - basis;

    const ptype = effectivePropertyType(a);
    let sec1245 = 0, sec1231 = 0;
    if (gl <= 0) {
      sec1231 = gl;
    } else if (ptype === "1245") {
      sec1245 = Math.min(gl, accum);
      sec1231 = gl - sec1245;
    } else {
      // 1250 (post-1986 SL ⇒ 0 ordinary) or none
      sec1231 = gl;
    }

    const e = byId(STATE.entities, a.entity_id);
    const row = {
      desc: a.description + (a.asset_number ? " ("+a.asset_number+")" : ""),
      acq: fmtDate(a.in_service_date),
      sold: fmtDate(d.disposal_date),
      proceeds, cost: totalCost, accum, basis, gl, sec1245, sec1231,
      ptype: PROP_TYPE_LABELS[ptype] || ptype,
      entity: e ? e.name : "—",
    };
    groups[ptype].push(row);
    T.proceeds+=proceeds; T.cost+=totalCost; T.accum+=accum; T.basis+=basis;
    T.gl+=gl; T.sec1245+=sec1245; T.sec1231+=sec1231;
  });

  const headers = ["Description","Date acquired","Date sold","Property type","Entity",
    "Proceeds","Cost basis","Accum. dep.","Tax basis","Total gain/(loss)",
    "§1245 ordinary","§1231 gain"];

  const csvRows = [];
  const sectionTitles = { "1245":"§1245 — Personal property (Part III)", "1250":"§1250 — Real property", "none":"Other / non-recapture" };

  function buildSection(key) {
    const rows = groups[key];
    if (!rows.length) return null;
    const sub = { proceeds:0, cost:0, accum:0, basis:0, gl:0, sec1245:0, sec1231:0 };
    const rowEls = rows.map(r => {
      sub.proceeds+=r.proceeds; sub.cost+=r.cost; sub.accum+=r.accum;
      sub.basis+=r.basis; sub.gl+=r.gl; sub.sec1245+=r.sec1245; sub.sec1231+=r.sec1231;
      csvRows.push([r.desc, r.acq, r.sold, r.ptype, r.entity,
        r.proceeds.toFixed(2), r.cost.toFixed(2), r.accum.toFixed(2), r.basis.toFixed(2),
        r.gl.toFixed(2), r.sec1245.toFixed(2), r.sec1231.toFixed(2)]);
      return [r.desc, r.acq, r.sold, r.ptype, r.entity,
        {class:"num",value:fmt$(r.proceeds)},{class:"num",value:fmt$(r.cost)},
        {class:"num",value:fmt$(r.accum)},{class:"num",value:fmt$(r.basis)},
        {class:"num",value:fmt$(r.gl)},
        {class:"num",value:fmt$(r.sec1245)},{class:"num",value:fmt$(r.sec1231)}];
    });
    rowEls.push([el("b",{},"Subtotal"), "","","","",
      {class:"num",value:el("b",{},fmt$(sub.proceeds))},{class:"num",value:el("b",{},fmt$(sub.cost))},
      {class:"num",value:el("b",{},fmt$(sub.accum))},{class:"num",value:el("b",{},fmt$(sub.basis))},
      {class:"num",value:el("b",{},fmt$(sub.gl))},
      {class:"num",value:el("b",{},fmt$(sub.sec1245))},{class:"num",value:el("b",{},fmt$(sub.sec1231))}]);
    csvRows.push(["Subtotal — "+sectionTitles[key], "","","","",
      sub.proceeds.toFixed(2), sub.cost.toFixed(2), sub.accum.toFixed(2), sub.basis.toFixed(2),
      sub.gl.toFixed(2), sub.sec1245.toFixed(2), sub.sec1231.toFixed(2)]);
    return card(sectionTitles[key], tableEl(
      headers.map((h,i)=>i>=5?{label:h,class:"num"}:h), rowEls));
  }

  const summary = card("Form 4797 totals — "+year, tableEl(
    ["", {label:"Proceeds",class:"num"},{label:"Cost basis",class:"num"},
     {label:"Accum. dep.",class:"num"},{label:"Tax basis",class:"num"},
     {label:"Total gain/(loss)",class:"num"},
     {label:"§1245 ordinary (Part III)",class:"num"},
     {label:"§1231 gain (Part I)",class:"num"}],
    [["TOTAL",
      {class:"num",value:fmt$(T.proceeds)},{class:"num",value:fmt$(T.cost)},
      {class:"num",value:fmt$(T.accum)},{class:"num",value:fmt$(T.basis)},
      {class:"num",value:fmt$(T.gl)},
      {class:"num",value:fmt$(T.sec1245)},{class:"num",value:fmt$(T.sec1231)}]]
  ));
  csvRows.push([]);
  csvRows.push(["TOTAL","","","","",
    T.proceeds.toFixed(2), T.cost.toFixed(2), T.accum.toFixed(2), T.basis.toFixed(2),
    T.gl.toFixed(2), T.sec1245.toFixed(2), T.sec1231.toFixed(2)]);

  setCsv({filename:"form_4797_"+year+".csv", headers, rows: csvRows});

  const wrap = el("div",{});
  wrap.appendChild(summary);
  if (!disps.length) wrap.appendChild(card(null, el("p",{class:"small"},"No disposals in "+year+".")));
  ["1245","1250","none"].forEach(k => { const s = buildSection(k); if (s) wrap.appendChild(s); });
  return wrap;
}

// ---------- Form 4562: Depreciation & Amortization ----------
// Current-year acquisitions bucketed by class life (3 / 5 / 7 / 10 / 15 / 20 /
// 25 / 27.5 / 39 / Other). Plus a single "other depreciation" line for prior-
// year assets (line 17). Plus a per-entity rollup. Plus grand totals (§179,
// bonus, regular MACRS, total). Trading inventory and land are excluded.
function renderForm4562(year, setCsv) {
  const CLASS_LIVES = [3, 5, 7, 10, 15, 20, 25, 27.5, 39];
  const lifeBucket = (life) => {
    const L = +life || 0;
    for (const cl of CLASS_LIVES) if (Math.abs(L - cl) < 0.01) return String(cl);
    return "Other";
  };
  const yearOfStr = s => s ? new Date(s).getUTCFullYear() : 0;

  // Excludes inventory + land — neither is depreciated
  const list = STATE.assets
    .filter(a => !a.is_inventory && !a.is_land)
    .filter(a => yearOfStr(a.in_service_date) <= year);

  const enriched = list.map(a => {
    const disp = STATE.disposals.find(d => d.asset_id === a.id);
    const dispThisYr = disp && yearOfStr(disp.disposal_date) === year;
    const effective = dispThisYr ? Object.assign({}, a, { disposal_date: disp.disposal_date }) : a;
    const sched = Depreciation.schedule(effective, year);
    const yr = sched.find(r => r.year === year) || null;
    return {
      a, yr,
      inYr: yearOfStr(a.in_service_date),
      cost: (+a.cost || 0) + (+a.improvements_cost || 0),
      sec179: yr ? yr.sec179 : 0,
      bonus: yr ? yr.bonus : 0,
      reg: yr ? yr.depreciation : 0,
      total: yr ? yr.total_expense : 0,
    };
  });

  const current = enriched.filter(x => x.inYr === year);
  const prior = enriched.filter(x => x.inYr < year);

  // ---- Section 1: current-year acquisitions, by class life ----
  const buckets = {};
  CLASS_LIVES.forEach(cl => buckets[String(cl)] = { count:0, cost:0, sec179:0, bonus:0, reg:0, total:0 });
  buckets["Other"] = { count:0, cost:0, sec179:0, bonus:0, reg:0, total:0 };
  current.forEach(x => {

async function renderAdminLog(root) {
  const filter = { user:"", action:"", days:30 };

    el("div",{class:"bd"},
      el("div",{class:"row-bar"},
        field("User email", el("input",{type:"text",placeholder:"any",oninput:e=>{filter.user=e.target.value.toLowerCase(); render();}})),
        field("Action", (()=>{const s=el("select",{onchange:e=>{filter.action=e.target.value; render();}});

      if (filter.user) q = q.ilike("user_email","%"+filter.user+"%");
      if (filter.action) q = q.eq("action", filter.action);
      const { data, error } = await q;
      out.innerHTML = "";
      if (error) { out.appendChild(el("div",{class:"msg err"},"Error: "+error.message+" — run the activity_log migration in Supabase.")); return; }
      if (!data.length) { out.appendChild(el("div",{class:"msg warn"},"No log entries match.")); return; }
      // By-user summary
      const byUser = {};
      data.forEach(l=>{ byUser[l.user_email||"?"] = (byUser[l.user_email||"?"]||0)+1; });
      const summaryRows = Object.entries(byUser).sort((a,b)=>b[1]-a[1]).map(([u,n])=>[u,{class:"num",value:String(n)}]);
      out.appendChild(card("By user ("+data.length+" entries)", tableEl(["User",{label:"Count",class:"num"}], summaryRows)));
      out.appendChild(card(null, tableEl(
        ["When","User","Action","Entity","Entity ID","Summary"],

          l.user_email||"",
          l.action||"",
          l.entity_type||"",
          l.entity_id ? (function(){ const a = byId(STATE.assets, l.entity_id); if (a) { const L = el("a",{href:"#",style:"color:var(--maroon)"},a.description); L.onclick=ev=>{ev.preventDefault(); show("asset",{id:a.id});}; return L; } return (l.entity_id||"").slice(0,8); })() : "",
          l.summary||""
        ])
      )));
    } catch (e) {
      out.innerHTML = "";
      out.appendChild(el("div",{class:"msg err"},"Error: "+e.message));
    }
  }
  render();
}

function openImportModal() {
  const state = { raw:"", rows:[], errors:[], mapping:{} };
  const EXPECTED = ["description","asset_number","category","entity","cost","in_service_date","method","life_years","convention","bonus_pct","section_179","salvage_value","location","serial_number","vin","make","model","year","vendor","invoice_number","notes"];

  const ta = el("textarea",{placeholder:"Paste CSV (first row = headers). Required: description, cost, in_service_date, entity, method, life_years, convention.",
    style:"width:100%;min-height:140px;font-family:ui-monospace,monospace;font-size:12px"});
  const preview = el("div",{style:"max-height:300px;overflow:auto;margin-top:10px"});

  function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim().length);
    if (!lines.length) return {headers:[], rows:[]};
    const split = l => {
      const out = []; let cur = "", q=false;
      for (let i=0;i<l.length;i++){
        const c=l[i];
        if (c==='"'){ if (q && l[i+1]==='"'){ cur+='"'; i++; } else q=!q; }
        else if (c===',' && !q){ out.push(cur); cur=""; }
        else cur+=c;
      }
      out.push(cur); return out.map(s=>s.trim());
    };
    const headers = split(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,"_"));
    const rows = lines.slice(1).map(l=>{ const vals=split(l); const r={}; headers.forEach((h,i)=>r[h]=vals[i]||""); return r; });
    return { headers, rows };
  }
  function validate() {
    const out = parseCSV(ta.value);
    state.rows = out.rows; state.errors = [];
    preview.innerHTML = "";
    if (!out.rows.length) { preview.appendChild(el("div",{class:"small"},"Paste CSV above.")); return; }
    preview.appendChild(el("div",{class:"small",style:"margin-bottom:6px"},"Rows: "+out.rows.length+" · Headers: "+out.headers.join(", ")));
    // Show first 5 rows
    const showRows = out.rows.slice(0,5).map((r,idx)=> {
      const msgs = [];
      if (!r.description) msgs.push("missing description");
      if (!r.cost || isNaN(+r.cost)) msgs.push("bad cost");
      if (!r.in_service_date) msgs.push("missing in_service_date");
      if (!r.entity) msgs.push("missing entity");
      const ent = byName(STATE.entities, r.entity);
      if (r.entity && !ent) msgs.push("entity \""+r.entity+"\" not found");
      const cat = r.category ? byName(STATE.categories, r.category) : null;
      if (r.category && !cat) msgs.push("category \""+r.category+"\" not found");
      return [idx+2, r.description||"", r.entity||"", r.category||"", r.cost||"", r.in_service_date||"", r.method||"", msgs.join("; ")||""];
    });
    preview.appendChild(tableEl(
      ["Row","Description","Entity","Category","Cost","In service","Method","Issues (first 5 rows)"],
      showRows
    ));
  }
  ta.addEventListener("input", validate);

  modal({ title:"Import assets from CSV", wide:true,
    body: el("div",{},
      el("div",{class:"msg warn"},
        "Tip: download the template, fill it in Excel, then paste the CSV here.  ",
        el("a",{href:"#",onclick:e=>{e.preventDefault(); downloadCSV("asset_import_template.csv", EXPECTED, [EXPECTED.map(()=>"")]);}}, "Download template")
      ),
      el("div",{class:"small",style:"margin-bottom:6px"},
        "Required: description, cost, in_service_date (YYYY-MM-DD), entity (name must match), method (bonus|ddb|db150|sl), life_years, convention (half_year|mid_quarter|mid_month).  Category optional — will auto-fill defaults if it matches."
      ),
      ta, preview
    ),
    saveLabel:"Import "+0+" assets",
    footer: el("div",{class:"ft"},
      el("button",{class:"btn secondary",onclick:()=>$("#modalHost").innerHTML=""},"Cancel"),
      el("button",{class:"btn",id:"doImport",onclick:async()=>{
        const rows = state.rows;
        if (!rows.length) return flash("Nothing to import","warn");
        let added=0, skipped=0, errs=[];
        for (let i=0;i<rows.length;i++){
          const r = rows[i];
          const ent = byName(STATE.entities, r.entity);
          const cat = r.category ? byName(STATE.categories, r.category) : null;
          if (!r.description || !r.cost || !r.in_service_date || !ent) { skipped++; errs.push("Row "+(i+2)+": missing required field / entity not found"); continue; }
          const rec = {
            description: r.description,
            asset_number: r.asset_number||null,
            category_id: cat?cat.id:null,
            entity_id: ent.id,
            cost: +r.cost||0,
            salvage_value: +r.salvage_value||0,
            section_179: +r.section_179||0,
            bonus_pct: +r.bonus_pct||0,
            in_service_date: r.in_service_date,
            method: r.method || (cat&&cat.default_method) || "ddb",
            life_years: +r.life_years || (cat&&cat.default_life_years) || 5,
            convention: r.convention || (cat&&cat.default_convention) || "half_year",
            location: r.location||null,
            serial_number: r.serial_number||null,
            vin: r.vin||null,
            make: r.make||null,
            model: r.model||null,
            year: r.year?+r.year:null,
            vendor: r.vendor||null,
            invoice_number: r.invoice_number||null,
            notes: r.notes||null,
            created_by: USER.email
          };
          try { await upsert("assets", rec); added++; }
          catch(e){ skipped++; errs.push("Row "+(i+2)+": "+e.message); }
        }
        await refreshAll();
        $("#modalHost").innerHTML=""; show("assets");
        flash("Imported "+added+" assets"+(skipped?", skipped "+skipped:""), skipped?"warn":"ok");
        if (errs.length) console.log(errs.join("\n"));
      }},"Import")
    )
  });
  validate();
}

// ============================================================
// CSV download helper
// ============================================================
function downloadCSV(filename, headers, rows) {
  const esc = v => {
    if (v==null) return "";
    const s = String(v); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const lines = [headers.map(esc).join(",")];
  rows.forEach(r => lines.push(r.map(esc).join(",")));
  const blob = new Blob([lines.join("\n")], { type:"text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

  if (!a) return "";
  const yr = a.foaling_year ? String(a.foaling_year).slice(-2) : "";
  const color = a.color ? String(a.color).trim().slice(0,3).toLowerCase() : ""; // 'bay'->'bay', 'chestnut'->'che'
  const colorShort = ({bay:"b",chestnut:"ch",gray:"gr",grey:"gr",black:"bl",palomino:"pal",buckskin:"bs",roan:"rn",dun:"dn"})[ (a.color||"").toLowerCase() ] || color;
  const sex = (a.sex||"").toLowerCase();
  const pedigree = (a.sire || a.dam) ? " ("+(a.sire||"?")+" x "+(a.dam||"?")+")" : "";
  const parts = [yr, colorShort, sex].filter(Boolean).join(" ");
  return parts + pedigree;
}

// Pool summary row for KPI cards
function poolSummary(items) {
  const y = thisYear();
  const active = items.filter(a => a.status === "active");
  const inv = active.filter(a => a.is_inventory);
  const dep = active.filter(a => !a.is_inventory);
  const totCost = active.reduce((s,a)=>s+(+a.cost||0),0);
  const depTot = Depreciation.yearTotals(dep, y);
  const invCost = inv.reduce((s,a)=>s+(+a.cost||0),0);
  return {
    count: active.length,
    depCount: dep.length,
    invCount: inv.length,
    totCost,
    invCost,
    depCost: depTot.cost,
    nbv: depTot.nbv,
    accum: depTot.accumulated,
    thisYearDep: depTot.depreciation,
  };
}

// Shared roster renderer for pool views
function renderPoolRoster(root, opts) {
  const { poolType, title, bucketFilter, showBucket, showPedigree, showOwnership, addLabel } = opts;
  const pool = STATE.assets.filter(a => a.pool_type === poolType);
  const state = { q:"", bucket: bucketFilter||"", status:"active" };

  const header = el("div",{style:"display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px"},
    el("h2",{},title, " ", el("small",{},pool.length+" on file")),
    el("div",{style:"display:flex;gap:6px;flex-wrap:wrap"},
      el("button",{class:"btn", onclick:()=>{
        // Use the generic asset modal with pool_type pre-set via ctx hack.
        // Simpler: open asset modal and set pool_type on the object before render.
        openPoolAssetModal(null, poolType);
      }}, "+ "+addLabel),
      el("button",{class:"btn ghost", onclick:()=>openPoolImportModal(poolType)}, "Import CSV"),
      el("button",{class:"btn ghost", onclick:()=>exportPoolCSV(poolType)}, "Export CSV"),
    )
  );
  root.appendChild(header);

  // Summary KPIs
  const sum = poolSummary(pool);
  const kpiRow = el("div",{class:"grid cols-4", style:"margin-bottom:10px"},
    kpi("Active count", String(sum.count), sum.invCount?sum.invCount+" inventory":""),
    kpi("Total cost basis", fmt$(sum.totCost), sum.invCost?fmt$(sum.invCost)+" inventory":""),
    kpi("Accumulated dep.", fmt$(sum.accum), "Depreciable only"),
    kpi("Net book value", fmt$(sum.nbv + sum.invCost), "Depreciable NBV + inventory cost")
  );
  root.appendChild(kpiRow);

  // Filters
  const filterBar = el("div",{style:"display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap"});
  filterBar.appendChild(el("input",{type:"search",placeholder:"Search name / mare # / sire / dam...",style:"min-width:260px",
    oninput:e=>{ state.q=e.target.value.toLowerCase(); render(); }}));
  if (showBucket) {
    const bsel = el("select",{onchange:e=>{ state.bucket=e.target.value; render(); }});
    bsel.appendChild(el("option",{value:""},"All buckets"));
    ["Solo Horses","Graves Purchase","Repro","Solo - Post Cutover"].forEach(b=>bsel.appendChild(el("option",{value:b},b)));
    bsel.value = state.bucket||"";
    filterBar.appendChild(bsel);
  }
  const ssel = el("select",{onchange:e=>{ state.status=e.target.value; render(); }});
  [["active","Active only"],["disposed","Disposed only"],["","All"]].forEach(([v,l])=>ssel.appendChild(el("option",{value:v},l)));
  ssel.value = state.status;
  filterBar.appendChild(ssel);
  root.appendChild(filterBar);

  const tableHost = el("div",{});
  root.appendChild(tableHost);

  function render() {
    tableHost.innerHTML = "";
    const y = thisYear();
    const filtered = pool.filter(a => {
      if (state.status && a.status !== state.status) return false;
      if (showBucket && state.bucket && a.bucket_tag !== state.bucket) return false;
      if (state.q) {
        const hay = [a.description, a.asset_number, a.sire, a.dam, a.bucket_tag, a.color].filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(state.q)) return false;
      }
      return true;
    });
    const headers = ["#"];
    if (showBucket) headers.push("Bucket");
    headers.push("Description");
    if (showPedigree) headers.push("Horse");
    headers.push("In-service","Cost");
    if (showOwnership) headers.push("Solo %");
    headers.push("Accum.","NBV","Status","");
    const rows = filtered.map(a => {
      const sched = a.is_inventory ? [] : Depreciation.schedule(a, y);
      const last = sched[sched.length-1];
      const acc = last ? last.accumulated : 0;
      const nbv = (+a.cost||0) - acc;
      const r = [a.asset_number || ""];
      if (showBucket) r.push(a.bucket_tag || "—");
      r.push(el("a",{href:"#",onclick:e=>{e.preventDefault(); show("asset",{id:a.id});}}, a.description || "(no name)"));
      if (showPedigree) r.push(el("span",{style:"font-family:monospace;font-size:12px"}, horseDisplayName(a) || "—"));
      r.push(fmtDate(a.in_service_date));
      r.push({class:"num", value: fmt$(a.cost)});
      if (showOwnership) r.push((a.ownership_pct==null?100:a.ownership_pct)+"%");
      r.push({class:"num", value: fmt$(acc)});
      r.push({class:"num", value: fmt$(nbv)});
      r.push(el("span",{class:"chip "+(a.status==="active"?"ok":a.status==="disposed"?"err":"warn")}, a.is_inventory ? "inv" : a.status));
      r.push(el("div",{style:"display:flex;gap:4px"},
        el("button",{class:"btn ghost sm",onclick:()=>openPoolAssetModal(a.id, poolType)},"Edit"),
        a.status==="active" && el("button",{class:"btn ghost sm",onclick:()=>openDisposalModal(a.id)},"Dispose")
      ));
      return r;
    });
    tableHost.appendChild(tableEl(headers, rows, {empty:"No "+title.toLowerCase()+" match."}));
  }
  render();
}

// Opens the regular asset modal with pool_type pre-set (for new records)
function openPoolAssetModal(id, poolType) {
  if (id) { openAssetModal(id); return; }
  // Create a stub asset with pool_type set, then open the modal.
  // Trick: push a temporary default into STATE so openAssetModal sees it — simpler to monkey-patch:
  // We'll just call openAssetModal(null) and it uses defaults; but pool_type needs to be set.
  // Easiest: open the modal, then set the pool select programmatically after DOM ready.
  openAssetModal(null);
  setTimeout(() => {
    // Find the pool select in the rendered modal and set it
    const sels = document.querySelectorAll("#modalHost select");
    for (const s of sels) {
      // The pool select has option values "", "recip_mare", "trading"
      if (s.querySelector('option[value="recip_mare"]') && s.querySelector('option[value="trading"]')) {
        s.value = poolType;
        s.dispatchEvent(new Event("change"));
        break;
      }
    }
  }, 60);
}

VIEWS.recip_mares = function(root) {
  renderPoolRoster(root, {
    poolType: "recip_mare",
    title: "Recip Mares",
    showBucket: true,
    showPedigree: false,
    showOwnership: false,
    addLabel: "Add Recip Mare"
  });
  // Bucket subtotal table
  const items = STATE.assets.filter(a=>a.pool_type==="recip_mare" && a.status==="active");
  const byBucket = {};
  items.forEach(a => {
    const key = a.bucket_tag || "(unlabeled)";
    if (!byBucket[key]) byBucket[key] = { count:0, cost:0, nbv:0 };
    byBucket[key].count++;
    byBucket[key].cost += (+a.cost||0);
    const sched = Depreciation.schedule(a, thisYear());
    const last = sched[sched.length-1];
    const acc = last ? last.accumulated : 0;
    byBucket[key].nbv += (+a.cost||0) - acc;
  });
  const bucketRows = Object.entries(byBucket).sort().map(([k,v])=>[k, v.count, {class:"num",value:fmt$(v.cost)}, {class:"num",value:fmt$(v.nbv)}]);
  if (bucketRows.length) {
    root.appendChild(el("h3",{style:"margin-top:16px;font-size:14px"},"Active by bucket"));
    root.appendChild(tableEl(["Bucket","Count","Cost","NBV"], bucketRows));
  }
};

// ============================================================
// VIEW: Property detail — landing page for one property_group
// Shows all sub-assets, KPIs, year-by-year depreciation rollup, and an
// action to dispose of the whole property at once.
// ============================================================
VIEWS.propertyDetail = function(root, ctx) {
  const pname = ctx && ctx.name;
  if (!pname) { show("properties"); return; }

  const items = STATE.assets.filter(a => a.pool_type === "property" && a.property_group === pname);
  if (!items.length) {
    root.appendChild(el("div",{style:"margin-bottom:10px"},
      el("a",{href:"#",style:"color:var(--maroon);text-decoration:none",
        onclick:ev=>{ev.preventDefault(); show("properties");}}, "← Back to properties")
    ));
    root.appendChild(el("h2",{}, pname));
    root.appendChild(el("p",{class:"small"},"No sub-assets under this property name."));
    return;
  }

  const y = thisYear();
  const active = items.filter(a => a.status === "active");
  const disposedItems = items.filter(a => a.status === "disposed");
  const allDisposed = active.length === 0 && disposedItems.length > 0;

  // Top-line totals
  const land   = items.filter(a=>a.is_land).reduce((s,a)=>s+(+a.cost||0), 0);
  const bldg   = items.filter(a=>!a.is_land).reduce((s,a)=>s+(+a.cost||0)+(+a.improvements_cost||0), 0);
  const totalCost = land + bldg;
  const yTot   = Depreciation.yearTotals(active.filter(a=>!a.is_land), y);
  const nbv    = totalCost - yTot.accumulated;

  // Entity (assume all sub-assets share an entity; pick the most common)
  const entityCounts = {};
  items.forEach(a => { const k = a.entity_id || ""; entityCounts[k] = (entityCounts[k]||0)+1; });
  const entityId = Object.keys(entityCounts).sort((a,b)=>entityCounts[b]-entityCounts[a])[0];
  const ent = entityId ? byId(STATE.entities, entityId) : null;

  // Header
  root.appendChild(el("div",{style:"margin-bottom:10px"},
    el("a",{href:"#",style:"color:var(--maroon);text-decoration:none",
      onclick:ev=>{ev.preventDefault(); show("properties");}}, "← Back to properties")
  ));
  root.appendChild(el("h2",{}, pname, " ",
    allDisposed ? el("span",{class:"chip err"}, "DISPOSED") : null));
  root.appendChild(el("div",{class:"small",style:"margin-bottom:14px"},
    [ent?ent.name:null, items.length+" sub-asset"+(items.length!==1?"s":""),
      land>0 ? fmt$(land)+" land" : null].filter(Boolean).join(" · ")));

  // KPIs
  root.appendChild(el("div",{class:"grid cols-5", style:"margin-bottom:14px"},
    kpi("Sub-assets", String(items.length), active.length+" active"+(disposedItems.length?(" · "+disposedItems.length+" disposed"):"")),
    kpi("Total cost", fmt$(totalCost), fmt$(land)+" land"),
    kpi("Accum. depreciation", fmt$(yTot.accumulated), null),
    kpi("Net book value", fmt$(nbv), null),
    kpi(y+" depreciation", fmt$(yTot.depreciation), null),
  ));

  // Action buttons
  root.appendChild(el("div",{style:"margin:0 0 16px;display:flex;gap:8px;flex-wrap:wrap"},
    el("button",{class:"btn", onclick:()=>openPropertyModal(pname)}, "Edit property"),
    el("button",{class:"btn", onclick:()=>openAssetModal(null, {pool_type:"property", property_group:pname, entity_id:entityId||null})}, "+ Add asset to property"),
    !allDisposed ? el("button",{class:"btn danger", onclick:()=>openPropertyDisposeModal(pname)}, "Dispose entire property") : null,
  ));

  // Sub-assets table
  const subHeaders = ["Asset","Category","In service","Cost","Prior accum","Accum dep",y+" dep","NBV","Status"];
  const subRows = items
    .sort((a,b)=> (a.is_land?0:1)-(b.is_land?0:1) || (a.description||"").localeCompare(b.description||""))
    .map(sub => {
      const cat = byId(STATE.categories, sub.category_id);
      const sched = sub.is_land ? [] : Depreciation.schedule(sub, y);
      const last = sched[sched.length-1];
      const acc = last ? last.accumulated : (+sub.prior_accum_dep||0);
      const cur = sched.find(r=>r.year===y);
      const yExp = cur ? cur.total_expense : 0;
      const subCost = (+sub.cost||0) + (+sub.improvements_cost||0);
      const subNBV = subCost - acc;
      const link = el("a",{href:"#",style:"color:var(--maroon);text-decoration:none;font-weight:500;cursor:pointer"},
        sub.description || (cat?cat.name:"(no name)"));
      link.onclick = (ev) => { ev.preventDefault(); show("asset",{id:sub.id}); };
      return [link, cat?cat.name:"—", fmtDate(sub.in_service_date),
        {class:"num",value:fmt$(subCost)},
        {class:"num",value:fmt$(+sub.prior_accum_dep||0)},
        {class:"num",value:fmt$(acc)},
        {class:"num",value:fmt$(yExp)},
        {class:"num",value:fmt$(subNBV)},
        el("span",{class:"chip "+(sub.status==="active"?"ok":sub.status==="disposed"?"err":"warn")}, sub.status||"active")
      ];
    });
  root.appendChild(card("Sub-assets",
    tableEl(subHeaders.map((h,i)=>(i>=3 && i<=7)?{label:h,class:"num"}:h), subRows)));

  // Year-by-year rollup across all non-land active sub-assets
  const earliestYear = Math.min(...active.filter(a=>!a.is_land).map(a => new Date(a.in_service_date).getUTCFullYear()).filter(n=>!isNaN(n)));
  if (isFinite(earliestYear)) {
    const lastYear = y + 5; // show 5 years forward
    const rollup = [];
    let runAcc = 0;
    for (let yr = earliestYear; yr <= lastYear; yr++) {
      let yrDep = 0, yrCost = 0, yrCount = 0;
      active.filter(a=>!a.is_land).forEach(a => {
        const inY = new Date(a.in_service_date).getUTCFullYear();
        if (inY > yr) return;
        const sched = Depreciation.schedule(a, yr);
        const r = sched.find(x => x.year === yr);
        if (r) { yrDep += r.total_expense; yrCount++; }
        yrCost += (+a.cost||0) + (+a.improvements_cost||0);
      });
      runAcc += yrDep;
      const nbvAtEnd = yrCost - runAcc + land; // include land in NBV
      rollup.push([String(yr),
        String(yrCount),
        {class:"num",value:fmt$(yrCost+land)},
        {class:"num",value:fmt$(yrDep)},
        {class:"num",value:fmt$(runAcc)},
        {class:"num",value:fmt$(nbvAtEnd)},
        yr === y ? el("span",{class:"chip ok",style:"margin-left:6px"}, "current") : ""
      ]);
    }
    root.appendChild(card("Year-by-year depreciation rollup",
      tableEl(["Year","# Active",
        {label:"Total cost",class:"num"},
        {label:"Year dep.",class:"num"},
        {label:"Accumulated",class:"num"},
        {label:"NBV (year-end)",class:"num"},
        ""],
      rollup)));
  }

  // If any disposals exist, show a summary
  const dispsForProp = STATE.disposals.filter(d => items.some(a => a.id === d.asset_id));
  if (dispsForProp.length) {
    const dispHeaders = ["Date","Asset","Type","Cost","Proceeds","Gain/(Loss)"];
    const dispRows = dispsForProp
      .sort((a,b)=> new Date(b.disposal_date) - new Date(a.disposal_date))
      .map(d => {
        const a = byId(STATE.assets, d.asset_id);
        if (!a) return null;
        const a2 = Object.assign({}, a, { disposal_date: d.disposal_date });
        const sched = Depreciation.schedule(a2);
        const last = sched[sched.length-1];
        const acc = last ? last.accumulated : (+a.prior_accum_dep||0);
        const subCost = (+a.cost||0)+(+a.improvements_cost||0);
        const basis = subCost - acc;
        const gl = (+d.proceeds||0) - basis;
        return [fmtDate(d.disposal_date), a.description, d.disposal_type||"",
          {class:"num",value:fmt$(subCost)},
          {class:"num",value:fmt$(d.proceeds||0)},
          {class:"num",value:fmt$(gl)}];
      })
      .filter(Boolean);
    if (dispRows.length) {
      root.appendChild(card("Disposal history — "+dispRows.length+" record"+(dispRows.length!==1?"s":""),
        tableEl(dispHeaders.map((h,i)=>i>=3?{label:h,class:"num"}:h), dispRows)));
    }
  }
};

// ============================================================
// Dispose entire property — single transaction across all sub-assets.
// Allocates total proceeds pro-rata across sub-assets by their tax basis
// (cost + improvements − accumulated dep). Creates one disposal row per
// sub-asset and marks each asset as disposed. Used when a property sells
// as a whole.
// ============================================================
function openPropertyDisposeModal(pname) {
  const items = STATE.assets.filter(a =>
    a.pool_type === "property" && a.property_group === pname && a.status === "active"
  );
  if (!items.length) { flash("No active sub-assets to dispose","warn"); return; }

  const rec = { disposal_date: todayISO(), disposal_type: "sold", proceeds: 0, buyer: "", notes: "" };

  // Compute per-asset basis (NBV) for the allocation table
  function bases() {
    return items.map(a => {
      if (a.is_land) {
        return { id:a.id, desc:a.description, basis: +a.cost||0, isLand:true, accum:0 };
      }
      const sched = Depreciation.schedule(Object.assign({}, a, { disposal_date: rec.disposal_date }));
      const last = sched[sched.length-1];
      const acc = last ? last.accumulated : (+a.prior_accum_dep||0);
      const cost = (+a.cost||0) + (+a.improvements_cost||0);
      return { id:a.id, desc:a.description, basis: Math.max(cost - acc, 0), isLand:false, accum:acc, cost };
    });
  }

  function refresh() {
    const list = bases();
    const totalBasis = list.reduce((s,x)=>s+x.basis, 0) || 1;
    const totalProceeds = +rec.proceeds || 0;
    preview.innerHTML = "";
    const tot = { proceeds:0, basis:0, gl:0 };
    const rows = list.map(x => {
      // Pro-rata allocation by NBV; if total basis is 0, distribute equally.
      const alloc = totalBasis > 0 ? totalProceeds * (x.basis / totalBasis) : totalProceeds / list.length;
      const gl = alloc - x.basis;
      tot.proceeds += alloc; tot.basis += x.basis; tot.gl += gl;
      return [x.desc + (x.isLand?" (land)":""),
        {class:"num",value:fmt$(x.basis)},
        {class:"num",value:fmt$(alloc)},
        {class:"num",value:fmt$(gl)}];
    });
    rows.push([el("b",{},"TOTAL"),
      {class:"num",value:el("b",{},fmt$(tot.basis))},
      {class:"num",value:el("b",{},fmt$(tot.proceeds))},
      {class:"num",value:el("b",{},fmt$(tot.gl))}]);
    preview.appendChild(tableEl(["Sub-asset",
      {label:"Tax basis",class:"num"},
      {label:"Allocated proceeds",class:"num"},
      {label:"Gain/(Loss)",class:"num"}], rows));
  }

  const preview = el("div",{style:"margin-top:10px"});

  modal({ title:"Dispose entire property — "+pname,
    body: el("div",{class:"grid"},
      el("div",{class:"msg warn"},
        "This disposes of all "+items.length+" active sub-asset"+(items.length!==1?"s":"")+
        " under "+pname+" in one go. Total proceeds are allocated pro-rata by each asset's tax basis (NBV). One disposal row is created per sub-asset."),
      el("div",{class:"grid cols-2"},
        field("Disposal date *", el("input",{type:"date",value:rec.disposal_date,
          oninput:e=>{rec.disposal_date=e.target.value; refresh();}})),
        field("Type", (()=>{const s=el("select",{onchange:e=>rec.disposal_type=e.target.value});
          ["sold","scrapped","traded","lost","other"].forEach(t=>s.appendChild(el("option",{value:t},t)));
          s.value="sold"; return s;})()),
      ),
      el("div",{class:"grid cols-2"},
        field("Total proceeds *", el("input",{type:"number",step:"0.01",min:"0",value:0,
          oninput:e=>{rec.proceeds=+e.target.value||0; refresh();}})),
        field("Buyer", el("input",{type:"text",oninput:e=>rec.buyer=e.target.value})),
      ),
      field("Notes", el("textarea",{oninput:e=>rec.notes=e.target.value})),
      el("h3",{style:"margin:10px 0 2px;font-size:13px"},"Per-asset allocation preview"),
      preview
    ),
    saveLabel:"Record disposal of property",
    onSave: async () => {
      if (!rec.disposal_date) throw new Error("Pick a disposal date");
      if (!(+rec.proceeds >= 0)) throw new Error("Total proceeds must be a number");

      // Re-check server state to avoid double-disposing.
      const ids = items.map(a=>a.id);
      const { data: latest } = await sb.from("assets").select("id,status").in("id", ids);
      const stillActive = (latest||[]).filter(r => r.status === "active").map(r=>r.id);
      if (!stillActive.length) throw new Error("All sub-assets already disposed. Refresh the page.");

      const list = bases();
      const totalBasis = list.reduce((s,x)=>s+x.basis, 0) || 1;
      const totalProceeds = +rec.proceeds || 0;

      // Build the per-asset disposal payloads, only for assets still active server-side.
      const disposals = list
        .filter(x => stillActive.includes(x.id))
        .map(x => ({
          asset_id: x.id,
          disposal_date: rec.disposal_date,
          disposal_type: rec.disposal_type,
          proceeds: r2(totalBasis > 0 ? totalProceeds * (x.basis / totalBasis) : totalProceeds / list.length),
          buyer: rec.buyer || null,
          notes: ("Property-level disposal of \""+pname+"\". " + (rec.notes||"")).trim(),
          created_by: USER ? USER.email : null,
        }));

      const { error: dErr } = await sb.from("disposals").insert(disposals);
      if (dErr) throw dErr;
      const { error: uErr } = await sb.from("assets")
        .update({ status:"disposed", updated_at: new Date().toISOString() })
        .in("id", stillActive);
      if (uErr) throw uErr;

      await logActivity("property", null, "dispose_property",
        "Disposed property \""+pname+"\" — "+disposals.length+" sub-asset"+(disposals.length!==1?"s":"")+
        ", total proceeds "+fmt$(totalProceeds), { property_group: pname, count: disposals.length });

      await refreshAll();
      show("propertyDetail",{name:pname});
      flash("Property disposed — "+disposals.length+" sub-asset disposal record"+(disposals.length!==1?"s":"")+" created");
    }
  });

  refresh();
}

// ============================================================
// Property add/edit modal — creates multiple asset rows in one go
// ============================================================
function openPropertyModal(existingGroup) {
  // Collect existing sub-assets for this property (if editing)
  const existing = existingGroup
    ? STATE.assets.filter(a => a.pool_type==="property" && a.property_group===existingGroup)
    : [];
  const isNew = !existingGroup;

  // Auto-pick the Solo Select Properties LLC entity if present, else first entity
  const defaultEntity = STATE.entities.find(e => /solo select properties/i.test(e.name||""))
    || STATE.entities[0] || null;

  // Build a list of "lines" — each line = one asset to create/update
  // Seed with typical 3-line shape for new: Land, Building, Improvements
  function emptyLine(category, extra) {
    const catId = (STATE.categories.find(c => c.name === category) || {}).id || null;
    return Object.assign({
      id: null,
      description: "",
      category_id: catId,
      entity_id: defaultEntity ? defaultEntity.id : null,
      cost: 0,
      land_value: 0,
      improvements_cost: 0,
      prior_accum_dep: 0,
      in_service_date: todayISO(),
      method: null, life_years: null, convention: null, bonus_pct: 0, section_179: 0,
      is_land: category === "Land",
      notes: "",
    }, extra||{});
  }
  // Convert existing assets into the "line" shape
  const lines = isNew
    ? [ emptyLine("Land"), emptyLine("Residential Buildings"), emptyLine("Capitalized Building Improvements") ]
    : existing.map(a => Object.assign({}, a, { id: a.id }));

  const state = {
    propertyName: existingGroup || "",
    purchaseDate: (existing[0] && existing[0].in_service_date) || todayISO(),
  };

  const linesHost = el("div",{});
  function render() {
    linesHost.innerHTML = "";
    const lineDateInputs = []; // refs per line so cascade can update DOM directly
    lines.forEach((ln, idx) => {
      const box = el("div",{style:"border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;background:#faf8f5"});
      const c = byId(STATE.categories, ln.category_id);
      const applyCatDefaults = () => {
        const cat = byId(STATE.categories, ln.category_id);
        if (!cat) return;
        ln.is_land = cat.name === "Land";
        const presets = {
          "Residential Buildings":            { method:"sl", life_years:27.5, convention:"mid_month" },
          "Commercial Buildings":             { method:"sl", life_years:39,   convention:"mid_month" },
          "Agricultural Buildings":           { method:"sl", life_years:20,   convention:"half_year" },
          "Capitalized Building Improvements":{ method:"sl", life_years:27.5, convention:"mid_month" },
          "Land Improvements":                { method:"sl", life_years:15,   convention:"half_year" },
          "Fencing":                          { method:"ddb", life_years:7,   convention:"half_year" },
          "Farm Equipment":                   { method:"ddb", life_years:7,   convention:"half_year" },
          "Furniture & Fixtures":             { method:"ddb", life_years:7,   convention:"half_year" },
        };
        const p = presets[cat.name];
        if (p) { ln.method=p.method; ln.life_years=p.life_years; ln.convention=p.convention; }
      };
      box.appendChild(el("div",{style:"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"},
        el("div",{style:"font-weight:600;color:var(--maroon)"},"Line " + (idx+1) + (c ? " — " + c.name : "")),
        el("button",{class:"btn ghost sm",style:"color:var(--err)",onclick:()=>{ lines.splice(idx,1); render(); }},"Remove")
      ));
      // Date field — cascade from line 0 to others without re-rendering (preserves focus)
      const dateInput = el("input",{type:"date",value:ln.in_service_date||state.purchaseDate});
      dateInput.addEventListener("input", e => {
        ln.in_service_date = e.target.value;
        if (idx !== 0) ln._dateManual = true; // only mark manual for non-first lines
        if (idx === 0) {
          // Cascade to sibling lines that haven't been manually edited — update their inputs directly
          lines.forEach((other, i) => {
            if (i !== 0 && !other._dateManual) {
              other.in_service_date = e.target.value;
              if (lineDateInputs[i]) lineDateInputs[i].value = e.target.value;
            }
          });
        }
      });
      lineDateInputs[idx] = dateInput;
      const grid = el("div",{class:"grid cols-3"},
        field("Category *", (()=>{
          const s = el("select",{onchange:e=>{ ln.category_id=e.target.value||null; applyCatDefaults(); render(); }});
          s.appendChild(el("option",{value:""},"— select —"));
          STATE.categories.forEach(c => s.appendChild(el("option",{value:c.id}, c.name)));
          if (ln.category_id) s.value = ln.category_id;
          return s;
        })()),
        field("Description / sub-account", el("input",{type:"text",value:ln.description||"",oninput:e=>ln.description=e.target.value})),
        field("In-service date" + (idx===0 ? " (cascades ↓)" : ""), dateInput)
      );
      box.appendChild(grid);
      box.appendChild(el("div",{class:"grid cols-2"},
        field("Cost", moneyInput({value:ln.cost, onChange:v=>ln.cost=v})),
        field("Prior accum. dep. (already taken)", moneyInput({value:ln.prior_accum_dep, onChange:v=>ln.prior_accum_dep=v}))
      ));
      // Advanced depreciation overrides — hidden by default; category presets handle it
      if (!ln.is_land) {
        const lifeLabel = ln.life_years ? (ln.life_years + " yr") : "auto";
        const methodLabel = ({sl:"Straight Line","ddb":"200% DDB","db150":"150% DB","bonus":"Bonus+DDB"})[ln.method] || ln.method || "auto";
        const convLabel = ({half_year:"Half-Year",mid_quarter:"Mid-Quarter",mid_month:"Mid-Month"})[ln.convention] || "auto";
        const adv = el("details",{},
          el("summary",{style:"cursor:pointer;font-size:11px;color:var(--muted);margin-top:6px"},
            "Depreciation: "+methodLabel+" · "+lifeLabel+" · "+convLabel+" (auto-set — click to override)")
        );
        const methodSel = el("select",{onchange:e=>ln.method=e.target.value},
          ...[["sl","Straight Line"],["ddb","200% DDB"],["db150","150% DB"],["bonus","Bonus + DDB"]].map(([v,l])=>{
            const o = el("option",{value:v},l); if (ln.method===v) o.selected = true; return o;
          })
        );
        const convSel = el("select",{onchange:e=>ln.convention=e.target.value},
          ...[["half_year","Half-Year"],["mid_quarter","Mid-Quarter"],["mid_month","Mid-Month"]].map(([v,l])=>{
            const o = el("option",{value:v},l); if (ln.convention===v) o.selected = true; return o;
          })
        );
        adv.appendChild(el("div",{class:"grid cols-3",style:"margin-top:6px"},
          field("Method", methodSel),
          field("Life (years)", el("input",{type:"number",step:"0.5",min:"0.5",value:ln.life_years||"",oninput:e=>ln.life_years=+e.target.value||0})),
          field("Convention", convSel)
        ));
        box.appendChild(adv);
      }
      linesHost.appendChild(box);
    });
    // Add-line button
    linesHost.appendChild(el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-top:6px"},
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Land")); render(); }},"+ Land"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Residential Buildings")); render(); }},"+ Residential Building"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Agricultural Buildings")); render(); }},"+ Ag Building"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Capitalized Building Improvements")); render(); }},"+ Improvements"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Land Improvements")); render(); }},"+ Land Improvements"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Fencing")); render(); }},"+ Fencing"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine("Farm Equipment")); render(); }},"+ Equipment"),
      el("button",{class:"btn ghost sm",onclick:()=>{ lines.push(emptyLine(null)); render(); }},"+ Other")
    ));
  }
  render();

  modal({ title: isNew ? "Add Property" : "Edit Property — " + existingGroup,
    wide: true,
    body: el("div",{class:"grid"},
      el("div",{class:"grid cols-2"},
        field("Property name * (e.g., 109 W Pecan)", el("input",{type:"text",value:state.propertyName,oninput:e=>state.propertyName=e.target.value})),
        field("Entity", (()=>{
          const s = entitySelect({value: defaultEntity?defaultEntity.id:"", onchange:v=>state.entity_id=v});
          state.entity_id = defaultEntity ? defaultEntity.id : null;
          return s;
        })())
      ),
      field("Purchase / default in-service date", el("input",{type:"date",value:state.purchaseDate,oninput:e=>{
        state.purchaseDate=e.target.value;
        // Push date to any line that doesn't have one set manually (crude)
        lines.forEach(ln => { if (!ln.id) ln.in_service_date = state.purchaseDate; });
      }})),
      el("h3",{style:"margin:10px 0 4px;font-size:13px;color:var(--maroon)"},"Sub-accounts (each becomes its own asset row)"),
      linesHost
    ),
    saveLabel: isNew ? "Create property" : "Save changes",
    onSave: async () => {
      if (!state.propertyName.trim()) throw new Error("Enter a property name.");
      if (!lines.length) throw new Error("Add at least one sub-account line.");
      if (!state.entity_id) throw new Error("Pick an entity.");
      const propName = state.propertyName.trim();
      let created = 0, updated = 0;
      for (const ln of lines) {
        if (!ln.category_id) throw new Error("Every line needs a category.");
        if (!ln.cost && !ln.improvements_cost) continue; // skip empty
        const cat = byId(STATE.categories, ln.category_id);
        const payload = {
          pool_type: "property",
          property_group: propName,
          entity_id: state.entity_id,
          category_id: ln.category_id,
          description: ln.description || (propName + " - " + (cat?cat.name:"")),
          cost: +ln.cost || 0,
          improvements_cost: +ln.improvements_cost || 0,
          land_value: 0, // stored in separate land asset, not on buildings
          prior_accum_dep: +ln.prior_accum_dep || 0,
          in_service_date: ln.in_service_date || state.purchaseDate,
          // method/life/convention are NOT NULL in DB. For land, store placeholder values —
          // is_land=true makes the engine skip the schedule entirely so these values are never used.
          method: ln.method || "sl",
          life_years: ln.life_years || 27.5,
          convention: ln.convention || "mid_month",
          bonus_pct: 0,
          section_179: 0,
          is_land: !!ln.is_land,
          status: "active",
          notes: ln.notes || null,
        };
        if (!ln.id) payload.created_by = USER.email;
        if (ln.id) {
          await updateRec("assets", ln.id, Object.assign({}, payload, { updated_at: new Date().toISOString() }));
          updated++;
          await logActivity("asset", ln.id, "update", "Property "+propName+" — updated "+(cat?cat.name:"line"));
        } else {
          const saved = await insertRec("assets", payload);
          created++;
          await logActivity("asset", saved.id, "create", "Property "+propName+" — created "+(cat?cat.name:"line")+" at "+fmt$(payload.cost));
        }
      }
      await refreshAll();
      show("properties");
      flash("Saved "+propName+": "+created+" created, "+updated+" updated");
    }
  });
}

function exportPoolCSV(poolType) {
  const pool = STATE.assets.filter(a => a.pool_type === poolType);
  const y = thisYear();
  const headers = ["asset_number","description","bucket_tag","foaling_year","color","sex","sire","dam",
    "in_service_date","cost","salvage_value","section_179","bonus_pct","method","life_years","convention",
    "ownership_pct","is_inventory","entity_name","status","accum_dep","nbv"];
  const rows = pool.map(a => {
    const sched = a.is_inventory ? [] : Depreciation.schedule(a, y);
    const last = sched[sched.length-1];
    const acc = last ? last.accumulated : 0;
    const nbv = (+a.cost||0) - acc;
    const ent = byId(STATE.entities, a.entity_id);
    return [a.asset_number||"", a.description||"", a.bucket_tag||"", a.foaling_year||"", a.color||"",
      a.sex||"", a.sire||"", a.dam||"", a.in_service_date||"", a.cost||0, a.salvage_value||0,
      a.section_179||0, a.bonus_pct||0, a.method||"", a.life_years||"", a.convention||"",
      a.ownership_pct==null?100:a.ownership_pct, a.is_inventory?"true":"false",
      ent?ent.name:"", a.status||"", r2(acc), r2(nbv)];
  });
  downloadCSV((poolType==="recip_mare"?"recip_mares":"trading_horses")+"_"+todayISO()+".csv", headers, rows);
}

function openPoolImportModal(poolType) {
  const isRecip = (poolType === "recip_mare");
  const defaultBucket = isRecip ? "Solo - Post Cutover" : "";
  const tmplRecip = "asset_number,description,bucket_tag,foaling_year,color,sex,sire,dam,in_service_date,cost,section_179,bonus_pct,method,life_years,convention,entity_name,notes\n"
    + "M1234,Mare 1234,Solo Horses,2018,bay,f,Super Sire,Good Dam,2020-06-15,15000,0,20,bonus,7,half_year,Solo Farms,Example row\n";
  const tmplTrad = "asset_number,description,foaling_year,color,sex,sire,dam,in_service_date,cost,ownership_pct,is_inventory,section_179,bonus_pct,method,life_years,convention,entity_name,notes\n"
    + "T-001,Colt 22 bay,2022,bay,c,Super Sire,Good Dam,2023-05-01,25000,50,false,0,20,bonus,7,half_year,Solo Farms,Example row\n";
  const tmpl = isRecip ? tmplRecip : tmplTrad;
  let csvText = "";
  const ta = el("textarea",{rows:12,style:"width:100%;font-family:monospace;font-size:12px",
    placeholder:"Paste CSV here (header row required)…",oninput:e=>csvText=e.target.value});
  const preview = el("div",{style:"margin-top:8px;max-height:240px;overflow:auto;font-size:12px"});
  function parseCSV(txt) {
    const lines = txt.split(/\r?\n/).filter(l=>l.trim());
    if (!lines.length) return { header:[], rows:[] };
    const parseLine = line => {
      const out=[]; let cur=""; let q=false;
      for (let i=0;i<line.length;i++) {
        const ch=line[i];
        if (q) {
          if (ch==='"' && line[i+1]==='"') { cur+='"'; i++; }
          else if (ch==='"') q=false;
          else cur+=ch;
        } else {
          if (ch===',') { out.push(cur); cur=""; }
          else if (ch==='"') q=true;
          else cur+=ch;
        }
      }
      out.push(cur); return out;
    };
    const header = parseLine(lines[0]).map(h=>h.trim());
    const rows = lines.slice(1).map(parseLine);
    return { header, rows };
  }
  modal({ title:"Import "+(isRecip?"Recip Mares":"Trading Horses")+" CSV",
    wide: true,
    body: el("div",{class:"grid"},
      el("div",{class:"msg warn"},"Seed your roster from CSV. Matches existing rows by asset_number (within the same pool) — re-importing is safe. Dates in ISO format (YYYY-MM-DD)."),
      el("details",{},
        el("summary",{style:"cursor:pointer;font-size:12px"},"Template / column reference"),
        el("pre",{style:"background:#faf8f5;padding:8px;border-radius:4px;font-size:11px;overflow:auto"}, tmpl)
      ),
      field("Paste CSV", ta),
      el("button",{class:"btn ghost sm",onclick:()=>{
        const { header, rows } = parseCSV(csvText);
        preview.innerHTML = "";
        if (!header.length) { preview.textContent = "No CSV detected."; return; }
        preview.appendChild(el("div",{style:"margin-bottom:4px;color:var(--muted)"},"Preview: "+rows.length+" rows · "+header.length+" columns"));
        const tbl = el("table",{style:"width:100%;border-collapse:collapse;font-size:11px"});
        tbl.appendChild(el("thead",{},el("tr",{},header.map(h=>el("th",{style:"text-align:left;padding:3px 6px;background:#eee;border-bottom:1px solid #ccc"},h)))));
        const tb = el("tbody",{});
        rows.slice(0,20).forEach(r => tb.appendChild(el("tr",{},r.map(c=>el("td",{style:"padding:3px 6px;border-bottom:1px dotted #ddd"},c)))));
        tbl.appendChild(tb);
        preview.appendChild(tbl);
        if (rows.length>20) preview.appendChild(el("div",{class:"small"},"… and "+(rows.length-20)+" more"));
      }},"Preview"),
      preview
    ),
    saveLabel:"Import",
    onSave: async() => {
      const { header, rows } = parseCSV(csvText);
      if (!header.length) throw new Error("Paste a CSV with a header row.");
      if (!rows.length) throw new Error("No data rows.");
      const idx = Object.fromEntries(header.map((h,i)=>[h.toLowerCase(),i]));
      const required = ["description","in_service_date","cost"];
      for (const r of required) {
        if (idx[r] == null) throw new Error("Missing required column: "+r);
      }
      const catName = isRecip ? "Recipient Mares" : "Trading Horses";
      const cat = STATE.categories.find(c => c.name === catName);
      if (!cat) throw new Error("Category '"+catName+"' missing. Run the SQL migration first.");

      // Map entity_name -> id
      const entByName = {};
      STATE.entities.forEach(e => entByName[(e.name||"").toLowerCase()] = e.id);

      let inserted = 0, updated = 0, skipped = 0;
      const errors = [];
      for (const row of rows) {
        const get = k => { const i=idx[k]; return i==null ? "" : (row[i]||"").trim(); };
        const num = k => { const v=get(k); return v===""?null:(+v); };
        const bool = k => { const v=get(k).toLowerCase(); return v==="true"||v==="1"||v==="yes"; };
        try {
          const description = get("description");
          const cost = num("cost");
          const in_service_date = get("in_service_date");
          if (!description || !cost || !in_service_date) { skipped++; continue; }

          const entityRaw = get("entity_name");
          const entity_id = entityRaw ? (entByName[entityRaw.toLowerCase()] || null) : null;
          if (entityRaw && !entity_id) throw new Error("Entity not found: "+entityRaw);
          if (!entity_id) {
            // Fallback: use the first entity
            if (!STATE.entities.length) throw new Error("No entities exist. Create one first.");
          }

          const payload = {
            pool_type: poolType,
            category_id: cat.id,
            entity_id: entity_id || (STATE.entities[0] && STATE.entities[0].id),
            description,
            asset_number: get("asset_number"),
            bucket_tag: isRecip ? (get("bucket_tag") || defaultBucket) : null,
            foaling_year: num("foaling_year"),
            color: get("color") || null,
            sex: get("sex") || null,
            sire: get("sire") || null,
            dam: get("dam") || null,
            in_service_date,
            cost: cost,
            salvage_value: num("salvage_value") || 0,
            section_179: num("section_179") || 0,
            // OBBB: default 100% bonus on anything placed in service on/after 2025-01-20; else 0.
            bonus_pct: (() => {
              const v = num("bonus_pct");
              if (v != null) return v;
              const d = get("in_service_date");
              return d && d >= "2025-01-20" ? 100 : 0;
            })(),
            method: get("method") || "bonus",
            life_years: num("life_years") || 7,
            convention: get("convention") || "half_year",
            ownership_pct: isRecip ? 100 : (num("ownership_pct") == null ? 100 : num("ownership_pct")),
            is_inventory: bool("is_inventory"),
            notes: get("notes") || null,
            status: "active",
            created_by: USER.email,
          };

          // Match on (pool_type + asset_number) if provided
          const existing = payload.asset_number
            ? STATE.assets.find(a => a.pool_type===poolType && a.asset_number===payload.asset_number)
            : null;
          if (existing) {
            await updateRec("assets", existing.id, Object.assign({}, payload, { updated_at: new Date().toISOString() }));
            await logActivity("asset", existing.id, "update", "CSV import updated "+description, { source:"csv_import" });
            updated++;
          } else {
            const saved = await insertRec("assets", payload);
            await logActivity("asset", saved.id, "create", "CSV import created "+description+" — cost "+fmt$(cost), { source:"csv_import" });
            inserted++;
          }
        } catch(e) {
          errors.push(e.message || String(e));
        }
      }
      await refreshAll();
      show(poolType==="recip_mare" ? "recip_mares" : "trading");
      const msg = "Imported: "+inserted+" new, "+updated+" updated, "+skipped+" skipped"+(errors.length?" · "+errors.length+" errors":"");
      flash(msg, errors.length?"warn":"ok");
      if (errors.length) console.warn("Import errors:", errors);
    }
  });
}

// Wire up
// ============================================================
document.getElementById("loginLogo").src = SOLO_LOGO_B64;
document.getElementById("navLogo").src = SOLO_LOGO_B64;
$("#signInBtn").addEventListener("click", signIn);
$("#signOutBtn").addEventListener("click", signOut);

(async () => {
  try { await handleAuthAndStart(); }
  catch(e) { console.error(e); }
})();
})();
</script>
