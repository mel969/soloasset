<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Solo Asset Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='90'%3E%E2%99%A0%3C/text%3E%3C/svg%3E"/>
<style>
  :root {
    --maroon:#8b1a1a; --maroon-d:#6b1010; --maroon-l:#b34848;
    --bg:#f5f3f0; --card:#fff; --border:#d9d4cc; --text:#23201c; --muted:#6b6760;
    --ok:#2e7d32; --warn:#c77700; --err:#b00020;
    --radius:8px; --shadow:0 1px 2px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; }
  html, body { height:100%; margin:0; background:var(--bg); color:var(--text);
    font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }

  /* ---------- Login ---------- */
  #login { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { max-width:420px; width:100%; background:var(--card); padding:36px 32px;
    border-radius:var(--radius); box-shadow:var(--shadow); text-align:center; }
  .login-card h1 { margin:0 0 8px; font-size:26px; color:var(--maroon); letter-spacing:.5px; }
  .login-card p { color:var(--muted); margin:0 0 24px; }
  .google-btn { display:inline-flex; align-items:center; gap:10px; padding:12px 24px;
    background:#fff; border:1px solid #dadce0; border-radius:6px; font-weight:500; cursor:pointer;
    font-size:14px; color:#3c4043; }
  .google-btn:hover { background:#f8f9fa; box-shadow:0 1px 3px rgba(0,0,0,.08); }
  .err-box { color:var(--err); background:#fdecea; padding:10px 14px; border-radius:6px;
    margin-top:16px; font-size:13px; text-align:left; }

  /* ---------- App shell ---------- */
  #app { display:grid; grid-template-columns:220px 1fr; height:100vh; }
  nav.side { background:var(--maroon); color:#f7efe8; padding:18px 0; display:flex; flex-direction:column; }
  nav.side .brand { padding:0 18px 16px; font-size:18px; font-weight:700; letter-spacing:.3px;
    border-bottom:1px solid rgba(255,255,255,.15); margin-bottom:10px; }
  nav.side .brand span { color:#fff; }
  nav.side button.tab { background:none; border:0; color:inherit; padding:10px 18px; text-align:left;
    font-size:14px; cursor:pointer; border-left:3px solid transparent; }
  nav.side button.tab:hover { background:rgba(255,255,255,.07); }
  nav.side button.tab.active { background:rgba(0,0,0,.18); border-left-color:#fff; font-weight:600; }
  nav.side .user { margin-top:auto; padding:14px 18px; font-size:12px; border-top:1px solid rgba(255,255,255,.15); }
  nav.side .user b { display:block; font-size:13px; margin-bottom:2px; }
  nav.side .user a { color:#fff; text-decoration:underline; cursor:pointer; }

  main.content { overflow:auto; padding:24px 28px; }
  main h2 { margin:0 0 14px; font-size:20px; }
  main h2 small { color:var(--muted); font-weight:400; font-size:13px; margin-left:8px; }

  /* ---------- KPI cards ---------- */
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
  .kpi { background:var(--card); padding:14px 16px; border-radius:var(--radius); box-shadow:var(--shadow); border-top:3px solid var(--maroon); }
  .kpi .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; }
  .kpi .v   { font-size:22px; font-weight:700; margin-top:4px; }
  .kpi .sub { font-size:12px; color:var(--muted); margin-top:2px; }

  /* ---------- Card ---------- */
  .card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; }
  .card .hd { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .card .hd h3 { margin:0; font-size:15px; }
  .card .bd { padding:16px; }
  .card .tight { padding:0; }

  /* ---------- Buttons ---------- */
  .btn { background:var(--maroon); color:#fff; border:0; border-radius:6px; padding:8px 14px;
    font-size:13px; cursor:pointer; font-weight:500; }
  .btn:hover { background:var(--maroon-d); }
  .btn.secondary { background:#fff; color:var(--text); border:1px solid var(--border); }
  .btn.secondary:hover { background:#f2efea; }
  .btn.ghost { background:transparent; color:var(--maroon); }
  .btn.ghost:hover { background:rgba(139,26,26,.08); }
  .btn.danger  { background:var(--err); }
  .btn.danger:hover { background:#8a0018; }
  .btn.sm { padding:4px 10px; font-size:12px; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }

  /* ---------- Form ---------- */
  .grid { display:grid; gap:12px; }
  .grid.cols-2 { grid-template-columns:1fr 1fr; }
  .grid.cols-3 { grid-template-columns:repeat(3,1fr); }
  label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:500; }
  input[type=text], input[type=number], input[type=date], input[type=email], select, textarea {
    width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font:inherit; background:#fff;
  }
  input:focus, select:focus, textarea:focus { outline:0; border-color:var(--maroon); box-shadow:0 0 0 3px rgba(139,26,26,.14); }
  textarea { min-height:64px; resize:vertical; }
  .row-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }

  /* ---------- Table ---------- */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 12px; border-bottom:2px solid var(--border); background:#faf8f5; font-weight:600; font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
  td { padding:8px 12px; border-bottom:1px solid var(--border); }
  tr:hover td { background:#faf8f5; }
  td.num, th.num { text-align:right; font-variant-numeric:tabular-nums; }
  td.small { font-size:12px; color:var(--muted); }
  .chip { display:inline-block; padding:2px 8px; background:#eee4d9; color:var(--text); border-radius:10px; font-size:11px; font-weight:600; }
  .chip.ok   { background:#e8f5e9; color:var(--ok); }
  .chip.warn { background:#fff4e5; color:var(--warn); }
  .chip.err  { background:#fdecea; color:var(--err); }
  .chip.dim  { background:#eee; color:var(--muted); }

  /* ---------- Modal ---------- */
  .modal-back { position:fixed; inset:0; background:rgba(30,25,20,.45); display:flex; align-items:flex-start;
    justify-content:center; padding:40px 20px; z-index:100; overflow:auto; }
  .modal { background:var(--card); width:min(760px,100%); border-radius:var(--radius); box-shadow:0 12px 40px rgba(0,0,0,.25); }
  .modal .hd { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; }
  .modal .hd h3 { margin:0; font-size:16px; flex:1; }
  .modal .hd .x { background:none; border:0; font-size:22px; color:var(--muted); cursor:pointer; }
  .modal .bd { padding:20px; }
  .modal .ft { padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; }

  .msg { padding:10px 14px; border-radius:6px; font-size:13px; margin-bottom:12px; }
  .msg.ok { background:#e8f5e9; color:var(--ok); }
  .msg.err { background:#fdecea; color:var(--err); }
  .msg.warn { background:#fff4e5; color:var(--warn); }

  .filters { display:grid; grid-template-columns:2fr 1fr 1fr 1fr auto; gap:10px; align-items:end; }
  @media (max-width:900px) { .filters { grid-template-columns:1fr 1fr; } #app { grid-template-columns:1fr; } nav.side { flex-direction:row; overflow-x:auto; padding:8px; } nav.side .user{display:none} }

  .hidden { display:none !important; }
  code.kbd { background:#f3efe8; padding:1px 5px; border-radius:4px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
</style>
</head>
<body>

<!-- ========== LOGIN ========== -->
<div id="login">
  <div class="login-card" style="background:#fff;">
    <img id="loginLogo" alt="Solo" style="height:90px; margin-bottom:12px; display:block; margin-left:auto; margin-right:auto;"/>
    <h1 style="color:#8b1a1a; letter-spacing:0.05em; margin-top:4px;">Asset Tracker</h1>
    <p>Internal tool — fixed assets across the Solo family of entities.</p>
    <button class="google-btn" id="signInBtn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
    <div class="err-box" id="loginErr" style="display:none"></div>
    <p style="margin-top:26px; font-size:12px; color:var(--muted);">
      Only whitelisted addresses can access. Ask Mel to add your email.
    </p>
  </div>
</div>

<!-- ========== APP ========== -->
<div id="app" class="hidden">
  <nav class="side">
    <div class="brand" style="background:#fff; border-radius:6px; padding:8px 10px; margin:0 10px 10px; text-align:center;">
      <img id="navLogo" alt="Solo" style="height:40px; display:block; margin:0 auto;"/>
      <div style="font-size:11px; color:#6b6760; margin-top:4px; letter-spacing:.6px;">ASSET TRACKER</div>
    </div>
    <button class="tab active" data-view="dashboard">Dashboard</button>
    <button class="tab" data-view="assets">Assets</button>
    <button class="tab" data-view="recip_mares">Recip Mares</button>
    <button class="tab" data-view="trading">Horses</button>
    <button class="tab" data-view="properties">Properties</button>
    <button class="tab" data-view="transfers">Transfers</button>
    <button class="tab" data-view="disposals">Disposals</button>
    <button class="tab" data-view="reports">Reports</button>
    <button class="tab" data-view="entities">Entities</button>
    <button class="tab" data-view="categories">Categories</button>
    <button class="tab" data-view="admin" id="tab-admin" hidden>Admin</button>
    <div class="user">
      <b id="u-email">—</b>
      <span id="u-role" class="chip dim">user</span>
      &nbsp;<a id="signOutBtn">Sign out</a>
    </div>
  </nav>
  <main class="content" id="view"></main>
</div>

<div id="modalHost"></div>

<script>
(function (global) {
  "use strict";
  const r2 = n => Math.round((+n || 0) * 100) / 100;
  const yearOf  = d => new Date(d).getUTCFullYear();
  const monthOf = d => new Date(d).getUTCMonth() + 1;
  const quarterOf = d => Math.ceil(monthOf(d) / 3);
  function firstYearFraction(c, d) {
    if (c === "half_year")   return 0.5;
    if (c === "mid_quarter") return ({1:10.5,2:7.5,3:4.5,4:1.5}[quarterOf(d)]) / 12;
    if (c === "mid_month")   return (12 - monthOf(d) + 0.5) / 12;
    return 1;
  }
  function disposalYearFraction(c, d) {
    if (c === "half_year")   return 0.5;
    if (c === "mid_quarter") return ({1:1.5,2:4.5,3:7.5,4:10.5}[quarterOf(d)]) / 12;
    if (c === "mid_month")   return (monthOf(d) - 0.5) / 12;
    return 1;
  }
  function schedule(a, throughYear) {
    // Inventory held for resale is not depreciated (applies to Trading horses flagged as inventory).
    // Land is never depreciated.
    if (a && (a.is_inventory || a.is_land)) return [];
    const rawCost=+a.cost||0;
    const improvements=+a.improvements_cost||0;
    const land=+a.land_value||0;
    const priorAccum=+a.prior_accum_dep||0;
    // Total depreciable cost (pre-§179/bonus/salvage):
    //   total_value = cost + improvements - land
    // Example: bought land+building for $500k (cost) + $50k renovation (improvements) with $100k land → $450k depreciable.
    const cost=Math.max(rawCost+improvements-land,0);
    const salvage=+a.salvage_value||0;
    const sec179=Math.min(+a.section_179||0, Math.max(cost-salvage,0));
    const bonusPct=Math.max(0,Math.min(100,+a.bonus_pct||0));
    const method=a.method, life=Math.max(0.5,+a.life_years||0), conv=a.convention;
    const inDate=new Date(a.in_service_date), inYear=yearOf(inDate);
    const firstFrac=firstYearFraction(conv,inDate);
    const disposed=!!a.disposal_date, dispDate=disposed?new Date(a.disposal_date):null;
    const dispYear=disposed?yearOf(dispDate):null;
    const postSec=Math.max(cost-sec179,0);
    const bonusAmt=r2(postSec*(bonusPct/100));
    const depBasis=Math.max(postSec-bonusAmt-salvage,0);
    const dbRate=method==="ddb"?2/life:method==="db150"?1.5/life:method==="bonus"?2/life:0;
    // Seed accumulated with any prior-accum-dep carried over from before this asset entered the tracker.
    // NBV starts at cost - priorAccum so subsequent math stays consistent.
    const rows=[]; let nbv=Math.max(cost-priorAccum,0), remaining=Math.max(depBasis-priorAccum,0), accum=r2(priorAccum);
    const maxYears=Math.ceil(life)+3;
    for (let k=0; k<maxYears; k++) {
      const y=inYear+k;
      if (throughYear!=null && y>throughYear) break;
      if (disposed && y>dispYear) break;
      const isFirst=k===0, isDisp=disposed && y===dispYear;
      const used=isFirst?0:firstFrac+(k-1);
      const remLife=Math.max(life-used,0.0001);
      let s179=0,bon=0,dep=0; const openingNbv=nbv; const notes=[];
      if (isFirst) {
        s179=sec179; bon=bonusAmt;
        nbv-=(s179+bon); accum+=(s179+bon);
        if (s179>0) notes.push("§179 $"+s179.toLocaleString());
        if (bon>0)  notes.push("Bonus "+bonusPct+"%");
      }
      if (remaining>0.005) {
        let fy;
        if (method==="sl") fy=depBasis/life;
        else { const db=remaining*dbRate, sl=remaining/remLife; fy=Math.max(db,sl); }
        let frac=1;
        if (isFirst) frac=firstFrac;
        if (isDisp)  frac=disposalYearFraction(conv,dispDate);
        if (isFirst && isDisp) frac=Math.min(firstFrac,disposalYearFraction(conv,dispDate));
        dep=Math.min(fy*frac,remaining); dep=r2(dep);
        remaining-=dep; nbv-=dep; accum+=dep;
      }
      if (bonusPct>=100 && isFirst && remaining<0.005) notes.push("Fully expensed year 1");
      rows.push({year:y,opening_nbv:r2(openingNbv),sec179:r2(s179),bonus:r2(bon),
        depreciation:r2(dep),total_expense:r2(s179+bon+dep),accumulated:r2(accum),
        closing_nbv:r2(nbv),notes:notes.join("; ")});
      if (remaining<=0.005 && !disposed && (!isFirst || bonusPct>=100)) break;
      if (isDisp) break;
    }
    return rows;
  }
  function yearTotals(assets, y) {
    let cost=0,dep=0,acc=0,nbv=0,count=0;
    assets.forEach(a=>{
      const rs=schedule(a,y); const r=rs.find(x=>x.year===y);
      // "Cost" for display = total asset value (cost + improvements), land stays included on balance sheet.
      const totalValue = (+a.cost||0) + (+a.improvements_cost||0);
      cost+=totalValue; count++;
      if (r) { dep+=r.total_expense; acc+=r.accumulated; nbv+=r.closing_nbv; }
      else if (yearOf(a.in_service_date)>y) { nbv+=totalValue; }
      else { acc+=+a.prior_accum_dep||0; nbv+=totalValue-(+a.prior_accum_dep||0); }
    });
    return {cost:r2(cost),depreciation:r2(dep),accumulated:r2(acc),nbv:r2(nbv),count};
  }
  global.Depreciation = { schedule, yearTotals, firstYearFraction, disposalYearFraction };
})(window);
</script>

(function(){

  entities: [], categories: [], assets: [], transfers: [], disposals: [], allowed: [],
  // taxColsReady becomes true once the Form 4797 migration block has been run

  // the app keeps working.

};

const PROP_TYPE_LABELS = {
  "1245":"§1245 (personal property)",
  "1250":"§1250 (real property)",
  "none":"None / non-recapture",
};
const MIGRATION_SQL_4797 = [
  "alter table categories",

  "  check (property_type in ('1245','1250','none'));",
  "",
  "alter table assets",

  "  check (property_type in ('1245','1250','none'));"
].join("\n");

// ------- helpers -------
const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));
const el = (tag, attrs={}, ...kids) => {
  const n = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})) {
    if (k==="class") n.className=v;
    else if (k==="html") n.innerHTML=v;
    else if (k.startsWith("on") && typeof v==="function") n.addEventListener(k.slice(2),v);
    else if (v===true) n.setAttribute(k,"");
    else if (v===false||v==null) {}
    else n.setAttribute(k,v);
  }
  kids.flat().forEach(k=>{ if(k==null || k===false || k===true) return; n.appendChild(k.nodeType?k:document.createTextNode(String(k))); });
  return n;
};
const fmt$ = n => "$" + (Math.round((+n||0)*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const r2 = n => Math.round((+n || 0) * 100) / 100;
const fmtDate = s => s ? new Date(s).toLocaleDateString() : "";

// Money-formatted text input. Shows "$xxx,xxx.xx" on blur; lets user type freely.
// Usage: moneyInput({ value: current, onChange: v => obj.key = v })
function moneyInput({value, onChange, placeholder="$0.00"}) {
  const inp = el("input",{type:"text",inputmode:"decimal",placeholder:placeholder,style:"text-align:right"});
  const format = n => (n==null||n==="") ? "" : "$" + (Math.round((+n||0)*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  const parse = s => {
    if (s == null) return 0;
    const cleaned = String(s).replace(/[^0-9.\-]/g,"");
    return cleaned === "" ? 0 : (+cleaned || 0);
  };
  inp.value = format(value);
  inp.addEventListener("input", () => { if (onChange) onChange(parse(inp.value)); });
  inp.addEventListener("blur",  () => { inp.value = format(parse(inp.value)); });
  inp.addEventListener("focus", () => { inp.value = String(parse(inp.value) || ""); if (parse(inp.value)===0) inp.value=""; inp.select(); });
  return inp;
}
const todayISO = () => new Date().toISOString().slice(0,10);
const thisYear = () => new Date().getFullYear();
const byId = (arr,id) => arr.find(x=>x.id===id) || null;
const byName = (arr,name) => arr.find(x=>x.name && x.name.toLowerCase()===String(name||"").toLowerCase());

const METHOD_LABELS = { bonus:"Bonus + DDB", ddb:"200% DDB", db150:"150% DB", sl:"Straight Line" };
const CONV_LABELS   = { half_year:"Half-Year", mid_quarter:"Mid-Quarter", mid_month:"Mid-Month" };

// Resolve effective Form 4797 property type for an asset.
// Priority: per-asset override → category default → smart heuristic.
// Heuristics tuned for this operation:
//   • is_land → 'none' (land is not depreciable; no §1245/§1250 recapture)
//   • pool_type === 'property' AND life ≥ 27 → '1250' (residential/commercial buildings)
//   • everything else (recip mares, trading horses, equipment, fences, vehicles) → '1245'
function effectivePropertyType(a) {
  if (!a) return "1245";
  if (a.property_type) return a.property_type;
  const c = a.category_id ? byId(STATE.categories, a.category_id) : null;
  if (c && c.property_type) return c.property_type;
  if (a.is_land) return "none";
  const life = +a.life_years || 0;
  if (a.pool_type === "property" && life >= 27) return "1250";
  return "1245";
}
function effectivePropertyTypeLabel(a) {
  return PROP_TYPE_LABELS[effectivePropertyType(a)] || effectivePropertyType(a);
}

// ----- period-based depreciation helpers -----
// Compute depreciation split by custom date window [startISO, endISO] for one asset.
// Allocates each year's annual depreciation by day fraction within the year.
// Returns { priorAccum, periodExpense, endAccum, endNBV, monthly: [{ymd,value}] }.
function assetPeriodDep(a, startISO, endISO) {
  const start = new Date(startISO + "T00:00:00Z");
  const end   = new Date(endISO   + "T00:00:00Z");
  const sched = Depreciation.schedule(a);
  let priorAccum = 0, periodExpense = 0, endAccum = 0;
  const monthly = {}; // key "YYYY-MM" -> $
  const dayMs = 86400000;
  const addDays = (d,n) => new Date(d.getTime() + n*dayMs);
  const daysInYear = y => ((y%4===0 && y%100!==0) || y%400===0) ? 366 : 365;
  const yearBounds = y => [ new Date(Date.UTC(y,0,1)), new Date(Date.UTC(y,11,31)) ];
  for (const r of sched) {
    const [yStart, yEnd] = yearBounds(r.year);
    const dYear = daysInYear(r.year);
    const annual = r.total_expense || 0;
    // Prior-to-period portion of this year
    if (r.year < start.getUTCFullYear()) {
      priorAccum += annual;
      endAccum   += annual;
      continue;
    }
    if (r.year > end.getUTCFullYear()) break;
    // Overlap of [yStart,yEnd] with [start,end]
    const ovStart = yStart > start ? yStart : start;
    const ovEnd   = yEnd   < end   ? yEnd   : end;
    const ovDays  = ovEnd >= ovStart ? Math.floor((ovEnd - ovStart)/dayMs)+1 : 0;
    // Pre-period portion of this year (from yStart to day-before-start)
    const preEnd  = addDays(start, -1);
    const preOv   = preEnd >= yStart ? Math.floor(((preEnd < yEnd ? preEnd : yEnd) - yStart)/dayMs)+1 : 0;
    // Through-end-of-period portion of this year (yStart to min(end, yEnd))
    const thruEnd = (end < yEnd ? end : yEnd);
    const thruOv  = thruEnd >= yStart ? Math.floor((thruEnd - yStart)/dayMs)+1 : 0;
    priorAccum   += annual * (preOv / dYear);
    periodExpense += annual * (ovDays / dYear);
    endAccum     += annual * (thruOv / dYear);
    // Monthly bucket within overlap
    let cursor = new Date(Date.UTC(r.year, 0, 1));
    for (let m=0; m<12; m++) {
      const mStart = new Date(Date.UTC(r.year, m, 1));
      const mEnd   = new Date(Date.UTC(r.year, m+1, 0));
      const msOv   = (mEnd < start || mStart > end) ? 0
        : Math.floor(((mEnd<end?mEnd:end) - (mStart>start?mStart:start))/dayMs)+1;
      if (msOv > 0) {
        const key = r.year + "-" + String(m+1).padStart(2,"0");
        monthly[key] = (monthly[key] || 0) + annual * (msOv / dYear);
      }
    }
  }
  const endNBV = (+a.cost||0) - endAccum;
  return { priorAccum, periodExpense, endAccum, endNBV, monthly };
}

// ------- modal -------
function modal({title, body, onSave, saveLabel="Save", wide=false, footer=null}) {
  const host = $("#modalHost");
  const bd = typeof body === "function" ? body() : body;
  const close = () => host.innerHTML = "";
  const m = el("div",{class:"modal-back", onclick:e=>{ if(e.target===m) close();}},
    el("div",{class:"modal", style:wide?"width:min(980px,100%)":""},
      el("div",{class:"hd"}, el("h3",{},title||""), el("button",{class:"x",onclick:close},"✕")),
      el("div",{class:"bd"}, bd),
      footer === null
        ? el("div",{class:"ft"},
            el("button",{class:"btn secondary",onclick:close},"Cancel"),
            onSave && el("button",{class:"btn",onclick:async()=>{
              try { const keep = await onSave(); if (!keep) close(); }
              catch(e){ flash(e.message||"Error saving","err"); console.error(e); }
            }}, saveLabel))
        : footer));
  // Prevent double-submit: disable the primary save button while onSave is awaiting.
  if (onSave) {
    const btn = m.querySelector(".ft .btn:not(.secondary):not(.danger)");
    if (btn) {
      const orig = btn.onclick;
      let busy = false;
      btn.onclick = async (ev) => {
        if (busy) return;
        busy = true;
        const originalText = btn.textContent;
        btn.disabled = true; btn.textContent = "Saving…";
        try { await orig(ev); }
        finally { busy = false; btn.disabled = false; btn.textContent = originalText; }
      };
    }
  }
  host.appendChild(m);
  return { close, body: bd };
}
function confirmModal(msg, onYes) {
  modal({ title:"Confirm", body: el("p",{},msg), saveLabel:"Yes", onSave: async()=>{ await onYes(); } });
}

// ------- auth -------
async function ensureSupabase() {
  if (!SUPABASE_URL.startsWith("http") || SUPABASE_ANON_KEY.length < 20) {
    $("#loginErr").style.display="block";
    $("#loginErr").innerHTML = "Supabase not configured. Edit <code>index.html</code> and paste <b>SUPABASE_URL</b> and <b>SUPABASE_ANON_KEY</b> at the top of the file.";
    throw new Error("Supabase not configured");
  }
  if (!sb) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return sb;
}

async function signIn() {
  await ensureSupabase();
  const redirect = location.origin + location.pathname;
  const { error } = await sb.auth.signInWithOAuth({ provider:"google", options:{ redirectTo: redirect } });
  if (error) { $("#loginErr").style.display="block"; $("#loginErr").textContent = error.message; }
}
async function signOut() { if (sb) await sb.auth.signOut(); location.reload(); }

async function handleAuthAndStart() {
  await ensureSupabase();
  const { data } = await sb.auth.getSession();
  if (!data.session) return; // still on login
  const email = data.session.user.email;
  // check whitelist
  const { data: row, error } = await sb.from("allowed_emails")
    .select("email, role").eq("email", email.toLowerCase()).maybeSingle();
  if (error || !row) {
    $("#loginErr").style.display="block";
    $("#loginErr").textContent = "Sorry, " + email + " is not authorized. Ask Mel to whitelist your email.";
    await sb.auth.signOut();
    return;
  }
  USER = { email, role: row.role, id: data.session.user.id };
  $("#login").classList.add("hidden");
  $("#app").classList.remove("hidden");
  $("#u-email").textContent = email;
  $("#u-role").textContent = row.role;
  if (row.role === "admin") $("#tab-admin").hidden = false;
  await refreshAll();
  show("dashboard");
}

// ------- data layer -------
async function refreshAll() {
  const [ent, cat, as, tr, ds, em] = await Promise.all([
    sb.from("entities").select("*").order("sort_order").order("name"),
    sb.from("categories").select("*").order("sort_order").order("name"),
    sb.from("assets").select("*").order("in_service_date",{ascending:false}),
    sb.from("transfers").select("*").order("transfer_date",{ascending:false}),
    sb.from("disposals").select("*").order("disposal_date",{ascending:false}),
    sb.from("allowed_emails").select("*").order("email"),
  ]);
  STATE.entities = ent.data || [];
  STATE.categories = cat.data || [];
  STATE.assets = as.data || [];
  STATE.transfers = tr.data || [];
  STATE.disposals = ds.data || [];
  STATE.allowed = em.data || [];
  // Probe whether the property_type column exists (Form 4797 migration). If
  // Postgres errors on the select, we hide the per-asset/category override UI
  // and strip property_type from saves so the rest of the app keeps working.
  try {
    const probe = await sb.from("categories").select("property_type").limit(1);
    STATE.taxColsReady = !probe.error;
  } catch (_) { STATE.taxColsReady = false; }
}

async function upsert(table, record) {
  const { data, error } = await sb.from(table).upsert(record).select().single();
  if (error) throw error;
  return data;

const VIEWS = {};

  const tabKey = (name === "asset") ? "assets"
              : (name === "propertyDetail") ? "properties"
              : name;
